services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ids_platform
      POSTGRES_USER: ids_admin
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres-data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=Nk018hRAQFytWskYqtQduw
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka-data:/var/lib/kafka/data

  # 신규 - Traefik (게이트웨이). 외부에서 들어오는 요청을 각 서비스로 라우팅.
  # Docker 소켓을 읽어서, 아래 서비스들에 붙은 label만 보고 자동으로 라우팅 규칙을 만든다
  # (별도 정적 설정 파일 없이도 동작하는 "Docker Provider" 방식).
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"   # label 붙은 컨테이너만 라우팅 대상으로 삼음
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"    # 개발 단계용 - 운영 전환 시 반드시 인증 붙일 것
    ports:
      - "80:80"       # 실제 트래픽이 들어오는 대문
      - "8081:8080"    # Traefik 대시보드 (라우팅 현황 눈으로 확인용)
    volumes:
      - ${HOME}/.docker/run/docker.sock:/var/run/docker.sock:ro

  # 신규 - Ingest를 컨테이너화. Traefik이 "/ingest"로 시작하는 요청을 여기로 보냄
  ingest:
    build: ./ingest
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingest.rule=PathPrefix(`/`)"
      - "traefik.http.services.ingest.loadbalancer.server.port=8100"

volumes:
  redis-data:
  postgres-data:
  opensearch-data:
  kafka-data: