services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ids_platform
      POSTGRES_USER: ids_admin
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres-data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=Nk018hRAQFytWskYqtQduw
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/127.0.0.1/9094' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # 진입점 복원: Traefik = 플랫폼 단일 진입점.
  # 이전의 "h2c preface를 HTTP/1.1로 오인 → 404" 문제는 TCP 라우터(HostSNI)로 받아서
  # 생긴 것. gRPC cleartext(h2c)는 Traefik 정석대로 HTTP 라우터 + 백엔드 서비스
  # scheme=h2c 로 처리 (아래 otel-collector의 labels 참고).
  # 외부에서 보이는 주소는 기존과 동일하게 <호스트>:4317 (Target 쪽 설정 변경 불필요).
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.otlp-grpc.address=:4317"   # OTLP gRPC 전용 entrypoint
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "4317:4317"     # gRPC 입구도 이제 Traefik이 소유
      - "8081:8080"     # Traefik 대시보드
    volumes:
      # ${HOME}/.docker/run/... 은 macOS 전용 경로라 GCP VM(리눅스)에서 깨짐.
      # /var/run/docker.sock 은 리눅스·macOS·Windows(WSL2) 전부에서 동작하는 표준 경로.
      - /var/run/docker.sock:/var/run/docker.sock:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    # 호스트 포트 직접 노출 제거 — 입구는 Traefik으로 일원화.
    # (컨테이너 내부 4317/4318 리슨은 그대로. compose 네트워크 안의 다른 서비스는
    #  여전히 otel-collector:4317 로 직접 접근 가능)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.otlp-grpc.rule=PathPrefix(`/`)"
      - "traefik.http.routers.otlp-grpc.entrypoints=otlp-grpc"
      - "traefik.http.routers.otlp-grpc.service=otlp-grpc"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.port=4317"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.scheme=h2c"   # ★ 핵심 한 줄
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data:
  opensearch-data:
  kafka-data: