services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ids_platform
      POSTGRES_USER: ids_admin
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres-data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=Nk018hRAQFytWskYqtQduw
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka-data:/var/lib/kafka/data
    # otel-collector가 "kafka 컨테이너 시작됨"이 아니라 "kafka가 실제로 연결을 받을 수
    # 있음"을 기다리게 하려고 추가. (예전엔 depends_on만 있어서 kafka 부팅 중에
    # otel-collector가 먼저 붙으려다 connection refused로 죽는 문제가 있었음)
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/127.0.0.1/9094' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # Traefik의 TCP 라우터(HostSNI(`*`))가 h2c(gRPC cleartext) preface를 HTTP/1.1로
  # 오인해서 자기 기본 404 핸들러로 넘겨버리는 문제가 있었다 (otel-collector까지 아예
  # 안 닿고 Traefik 선에서 "404 page not found"를 뱉음). 이 스택에서 Traefik이 라우팅
  # 하던 게 gRPC 하나뿐이라, 그 경로를 프록시 없이 otel-collector가 직접 여는 걸로
  # 바꾸고 Traefik은 :80/대시보드 용도로만 남겨둔다.
  traefik:
    image: traefik:v2.11
    command:
        - "--providers.docker=true"
        - "--providers.docker.exposedbydefault=false"
        - "--entrypoints.web.address=:80"
        - "--api.dashboard=true"
        - "--api.insecure=true"
    ports:
        - "80:80"
        - "8081:8080"
    volumes:
        - ${HOME}/.docker/run/docker.sock:/var/run/docker.sock:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      kafka:
        condition: service_healthy
    # kafka가 늦게 뜨는 것 말고 다른 이유로 한 번 죽더라도 계속 죽어있지 않게 안전망으로 추가
    restart: on-failure

volumes:
  postgres-data:
  opensearch-data:
  kafka-data: