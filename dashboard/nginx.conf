# SPA(React Router 없이 클라이언트 사이드 뷰 전환만 쓰지만, 새로고침 시 임의
# 경로로 직접 진입할 수 있으므로) - 정적 파일과 매칭 안 되는 요청은 전부
# index.html로 넘겨서 클라이언트 라우팅이 처리하게 한다.
#
# 캐시 정책(2026-07-16 추가) - 예전엔 Cache-Control이 아예 없어서 브라우저가
# index.html을 휴리스틱 캐싱으로 오래 붙들고 있는 경우가 있었다. 재배포해서
# Vite가 JS/CSS 파일명을 새 해시로 바꿔도, 브라우저가 index.html 자체를 새로
# 안 받아오면 그 안의 <script src="/assets/index-OLDHASH.js"> 참조를 그대로
# 써서 계속 예전 번들을 돌린다(백엔드 스키마가 바뀐 뒤엔 이게 API 응답과
# 안 맞아 화면이 깨진 것처럼 보인다 - 실측 확인, 2026-07-16). index.html은
# 항상 재검증하게 하고, 해시가 박힌 정적 자산만 길게 캐싱한다.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
