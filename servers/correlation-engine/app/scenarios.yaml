# 시나리오 선언 룰 (P4-1). sequence/threshold 2타입.
#
# 아래 stage1/stage2/match 조건, mitre_technique_id는 엔진(sequence/threshold/join_on/
# 쿨다운/최신 덮어쓰기/PG sync) 동작을 검증하기 위한 예시다 - 실제 공격 체인 정의와
# MITRE 매핑은 팀 설계 후 이 파일만 교체하면 된다. 엔진 코드는 그대로 둬도 된다.
#
# join_on: 엔진 내부 로직/Redis 키 네임스페이스용 식별자 (pod/user_or_sa/source_ip).
# correlation_key_type: PostgreSQL enum 값 그대로 - Incident.correlation_key_type에
#   저장되는 값이라 join_on과 반드시 짝이 맞아야 한다 (app/rules.py의 _join_key 참고).

scenarios:
  # S1 (sequence, join_on=user_or_sa): 같은 유저/SA가 RBAC 상승(clusterrole(binding)/
  # role(binding) 생성·수정) 이후 falco 침입탐지 룰(쉘 실행/K8s API 접근)에 걸리면 발화.
  #
  # 원래 버전은 join_on=pod였는데 구조적으로 절대 안 맞는 조인이었다 - clusterrole/
  # rolebinding 같은 RBAC 오브젝트는 pod을 가리키는 게 아니라서 k8s_audit 쪽
  # orchestrator.resource.name엔 "그 role/binding 자신의 이름"이 들어간다(예:
  # "juice-shop-admin-binding"). falco 쪽 orchestrator.resource.name(k8s.pod.name)과는
  # 우연히 이름이 같지 않은 한 절대 매칭될 수 없었다 (S2의 was user.name 결측과 같은
  # 계열의 버그). user_or_sa로 바꿔서 RBAC를 바꾼 신원 기준으로 조인한다.
  # ⚠️ 이것도 완벽하진 않다: falco의 user.name은 컨테이너 안 OS 유저(예: root)라서
  # k8s_audit의 user.name(RBAC principal, 예: system:serviceaccount:default:app-sa)과
  # 다른 신원 체계다 - 우연히 문자열이 같을 때만 매칭된다. pod을 join_on으로 쓰려면
  # stage1을 RBAC 변경이 아니라 "그 pod에 대한" audit 이벤트(예: exec, S3 참고)로
  # 바꿔야 한다.
  #
  # stage1 조건은 severity.yaml의 RBAC 규칙(verb: create/patch, resource: cluster
  # role(binding)/role(binding))을 그대로 옮긴 것 - min_severity>=4로 뭉뚱그리던
  # 예전 방식은 severity.yaml이 우연히 RBAC 조합에만 4를 주고 있어서 성립했을 뿐이라
  # RBAC verb 범위가 넓어지면(README TBD) 의미가 깨지는 취약한 매칭이었다.
  - id: S1
    name: "RBAC 권한상승 이후 pod 침투"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit, falco]
    window_seconds: 300
    stage1:
      event_module: k8s_audit
      audit_verb: [create, patch]
      orchestrator_resource_type: [clusterroles, clusterrolebindings, roles, rolebindings]
    stage2:
      event_module: falco
      event_action: ["Terminal shell in container", "Contact K8s API Server From Container"]
    severity: 4
    mitre_technique_id: "T1078"

  # S2 (sequence, join_on=user_or_sa): 같은 user/SA가 시크릿을 조회(자격증명 정찰)한
  # 뒤 pod/deployment를 삭제(흔적 인멸 시도)하면 발화.
  # 예전 버전은 stage2가 was였는데, normalizer가 was 이벤트에 user.name을 채우지
  # 않아(nginx access log엔 k8s RBAC 신원 정보가 없음) join_key가 항상 None ->
  # stage2가 절대 매칭되지 않는 버그였다. k8s_audit -> k8s_audit 체인으로 교체.
  - id: S2
    name: "자격증명 조회 이후 흔적 삭제 시도"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 600
    stage1:
      event_module: k8s_audit
      event_action: ["get secrets", "list secrets"]
    stage2:
      event_module: k8s_audit
      event_action: ["delete pods", "delete deployments"]
    severity: 3
    mitre_technique_id: "T1552"

  # S3 (sequence, join_on=user_or_sa): RBAC 상승(S1 stage1과 동일 패턴) 이후 같은
  # 신원이 실제로 pod에 exec하면 발화. 두 스테이지 다 k8s_audit라 user.name이 항상
  # 신뢰성 있게 채워지고(S1처럼 falco의 OS 유저와 신원 체계가 갈리는 문제 없음),
  # normalizer/app/severity.yaml에 "S3 stage1/stage2 재료"로 이미 준비돼 있었지만
  # scenarios.yaml엔 빠져 있던 시나리오.
  - id: S3
    name: "RBAC 권한상승 이후 pod exec"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 300
    stage1:
      event_module: k8s_audit
      audit_verb: [create, patch]
      orchestrator_resource_type: [clusterroles, clusterrolebindings, roles, rolebindings]
    stage2:
      event_module: k8s_audit
      event_action: "create pods/exec"
    severity: 4
    mitre_technique_id: "T1609"

  # S4 (threshold, join_on=source_ip): 같은 IP에서 60초 안에 WAF 이벤트가 5건 이상
  # 발생하면 발화, 발화 후 300초 쿨다운.
  - id: S4
    name: "동일 IP WAF 다발 차단"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 5
    cooldown_seconds: 300
    match:
      event_module: waf
    severity: 3
    mitre_technique_id: "T1190"
