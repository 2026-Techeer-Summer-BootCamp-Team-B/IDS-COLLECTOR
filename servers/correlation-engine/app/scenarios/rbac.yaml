# RBAC 변경/권한 상승/백도어 계정 시나리오. 엔진 동작(sequence/threshold,
# join_on/correlation_key_type)과 설계 근거 출처는 ../README.md 참고.
#
# 이 파일 안에서 반복되는 roles/clusterroles/rolebindings/clusterrolebindings 조합은
# ids_shared.k8s_constants(normalizer가 코드에서 참조하는 canonical 목록)와 같은
# 뜻이다. kube-system/kube-public 네임스페이스 목록은 공유 상수가 아니라 이 파일과
# workload.yaml(S15)에 각각 하드코딩돼 있다(2026-07-15 - 미사용 공유 상수였던
# SYSTEM_NAMESPACES 제거, k8s_constants.py docstring 참고). 같은 목록이 normalizer/app/
# severity.yaml, Techeer-12th-b/k3d-audit-policy.yaml(kube-apiserver가 직접 읽어서
# Python으로 공유 불가)에도 있으니 바뀌면 전부 같이 고칠 것.

scenarios:
  # S3 (sequence, join_on=user_or_sa): RBAC 상승 이후 같은 신원이 실제로 pod에
  # exec/attach하면 발화. 두 스테이지 다 k8s_audit라 user.name이 항상 신뢰성 있게
  # 채워지고(workload.yaml의 S1처럼 falco의 OS 유저와 신원 체계가 갈리는 문제 없음).
  #
  # stage1 verb 범위는 K8s API의 RBAC 오브젝트 변경 verb 전체(create/delete/
  # deletecollection/patch/update)로 severity.yaml과 함께 확정 - 예전 create/patch만
  # 커버하던 좁은 범위(README RBAC verb TBD)를 대체. "replace"는 k8s audit verb에
  # 실존하지 않아(PUT도 "update"로 남는다) 오탈자였고, 대신 deletecollection(대량
  # 삭제, 예: kubectl delete clusterroles --all)이 빠져 있던 게 진짜 버그였다 -
  # 이게 빠지면 대량 RBAC 삭제 이후 pod exec가 와도 S3 stage1이 안 걸린다.
  # falcosecurity/plugins의 실제 룰들("ClusterRole With Wildcard Created" 등)은
  # request body(role.rules.resources/verbs, binding.role)까지 봐서 더 정교하게
  # 판정하는데, 그건 S12/S13이 담당한다.
  - id: S3
    name: "RBAC 권한상승 이후 pod exec"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 300
    stage1:
      event_module: k8s_audit
      audit_verb: [create, delete, deletecollection, patch, update]
      orchestrator_resource_type: [clusterroles, clusterrolebindings, roles, rolebindings]
    stage2:
      event_module: k8s_audit
      # falcosecurity/plugins의 "Attach/Exec Pod" 룰 조건이
      # "(kcreate or kget) and subresource in (exec,attach)"라 verb=get으로
      # 기록되는 exec/attach 요청도 실제로 있다(재확인 완료, 2026-07-12) -
      # create만 보면 그 케이스를 놓치는 게 버그였다. severity.yaml도 같이 수정.
      event_action:
        [
          "create pods/exec",
          "create pods/attach",
          "get pods/exec",
          "get pods/attach",
        ]
    severity: 4
    mitre_technique_id: "T1609"

  # S6 (threshold, join_on=user_or_sa, threshold=1): kube-system/kube-public처럼
  # 시스템 네임스페이스에 새 서비스어카운트가 생성되면 즉시 발화. threshold=1로
  # "카운트 누적이 필요 없는 단발성 critical 이벤트"를 threshold 엔진으로 처리 -
  # 쿨다운(600초)이 같은 신원의 반복 생성 스팸만 눌러준다. falcosecurity/plugins의
  # "Service Account Created in Kube Namespace" 룰(WARNING)과 동일 판정 로직 - 정상
  # 운영에서 시스템 네임스페이스에 SA를 새로 만드는 경우는 드물어서 백도어 계정
  # 생성 시도의 강한 신호다.
  - id: S6
    name: "시스템 네임스페이스 서비스어카운트 생성"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: serviceaccounts
      orchestrator_namespace: [kube-system, kube-public]
    severity: 4
    mitre_technique_id: "T1136"

  # S7 (sequence, join_on=user_or_sa): 같은 관리자 신원이 서비스어카운트를 만든 직후
  # RBAC 바인딩까지 부여하면 발화 - "백도어 계정을 만들고 곧바로 권한을 몰아준다"는
  # 전형적인 지속성(persistence) 확보 패턴. S6과 달리 SA 생성 자체가 아니라 "생성 +
  # 즉시 권한 부여"라는 완결된 시퀀스를 본다.
  #
  # 두 스테이지 다 같은 관리자 행위자(actor)의 k8s_audit 이벤트라 user.name이
  # 일관되게 채워지고, stage1(SA 생성)과 stage2(RBAC 바인딩 생성)를 "누가 했는지"로
  # 안전하게 조인한다. "생성된 SA 자신이 이후에 뭘 했는지"(예: 그 SA가 나중에
  # 뭔가에 접근)로 조인하려면 리소스 이름 -> 신원 교차 조인이 필요한데, 지금
  # 엔진의 join_on은 단일 필드 추출만 지원해서 불가능하다.
  #
  # ⚠️ CI/CD가 SA를 만들고 바로 롤바인딩을 붙이는 것도 정상 운영에서 흔해서
  # false positive가 날 수 있다 - 실사용 시 allow_list(예: CI 시스템 계정)로
  # 걸러내는 튜닝이 필요할 것.
  - id: S7
    name: "서비스어카운트 생성 이후 RBAC 권한 즉시 부여"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 300
    stage1:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: serviceaccounts
    stage2:
      event_module: k8s_audit
      audit_verb: [create, patch]
      orchestrator_resource_type: [clusterrolebindings, rolebindings]
    severity: 4
    mitre_technique_id: "T1098"

  # S9 (threshold, join_on=source_ip, threshold=1): system:anonymous 신원의 요청이
  # 실제로 성공(2xx)하면 발화 - falcosecurity/plugins의 "Anonymous Request Allowed"
  # 룰과 같은 신호(ka.auth.decision=allow)를 우리 normalizer가 이미 뽑는
  # event.outcome(status_code<400 여부)으로 대체한 것 - RBAC가 익명 접근을 허용하도록
  # 잘못 설정돼 있다는 뜻이라 클러스터 노출 사고의 강한 신호다. join_on은
  # user_or_sa("system:anonymous" 고정값이라 공격자별 구분이 안 됨) 대신 source_ip로
  # 잡아서 실제 공격자 IP 기준으로 인시던트를 나눈다.
  - id: S9
    name: "익명 요청 성공(RBAC 노출)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      user_name: "system:anonymous"
      event_outcome: success
    severity: 4
    mitre_technique_id: "T1133"

  # S11 (threshold, join_on=user_or_sa, threshold=1): "system:"으로 시작하는 내장
  # ClusterRole/Role이 수정·삭제되면 발화 - falcosecurity/plugins의 "System ClusterRole
  # Modified/Deleted" 룰과 동일 판정(그 룰은 system:coredns 등 알려진 예외를 빼지만,
  # 이 프로젝트는 단일 타깃 데모라 예외 목록 없이 전부 잡는다). app/rules.py의
  # orchestrator_resource_name_prefix 매칭을 쓴다. K8s 자체 내장 권한 체계를 건드리는
  # 건 앱 전용 롤을 건드리는 것보다 훨씬 위험해서(클러스터 전역 방어 기제 자체를
  # 약화시킴) T1685(Disable or Modify Tools, Defense Evasion)로 분류 - S3/S7의 RBAC
  # 변조(Execution/Persistence 관점)와는 다른 각도라 별도 시나리오로 뒀다.
  - id: S11
    name: "내장(system:) RBAC 롤 변조"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: [patch, update, delete]
      orchestrator_resource_type: [clusterroles, roles]
      orchestrator_resource_name_prefix: "system:"
    severity: 4
    mitre_technique_id: "T1685"

  # S12/S13 (threshold, threshold=1): request body 기반 첫 시나리오(2026-07-12).
  # k3d-audit-policy.yaml이 roles/clusterroles/rolebindings/clusterrolebindings의
  # create/update/patch/delete를 RequestResponse 레벨로 남겨서 이 4개 리소스에 한해
  # request body 파싱이 가능하다 - normalize_audit()의 _audit_role_rule_flags()/
  # _audit_binding_role_name()이 이 body를 읽어서 kubernetes.audit.role.rule_flags /
  # kubernetes.audit.binding.role_name을 채운다.

  # S12: role/clusterrole 생성 시 rules에 wildcard 리소스/verb, 쓰기 verb(create/update/
  # patch/delete/deletecollection), 또는 pods/exec 권한이 하나라도 있으면 발화 -
  # falcosecurity/plugins의 "ClusterRole With Wildcard Created" / "ClusterRole With
  # Write Privileges Created" / "ClusterRole With Pod Exec Created" 3개 룰을 하나의
  # 시나리오로 합쳤다(우리 엔진에서 세 룰 다 같은 조인/심각도/기법으로 다뤄서 나눌
  # 이유가 없었음). T1098(Account Manipulation)은 S7과 같은 이유로 재사용 -
  # "계정(역할)에 부여되는 권한 자체를 위험하게 만드는" 행위라는 점이 같다.
  - id: S12
    name: "위험한 권한을 가진 RBAC 룰 생성"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: [roles, clusterroles]
      audit_role_rule_flags_any: [wildcard_resource, wildcard_verb, write_verb, pods_exec]
    severity: 4
    mitre_technique_id: "T1098"

  # S13: rolebinding/clusterrolebinding이 cluster-admin 롤을 가리키면 발화 -
  # falcosecurity/plugins의 "Attach to cluster-admin Role" 룰과 동일 판정
  # (roleRef.name == "cluster-admin"). 클러스터 전체 관리자 권한을 통째로 넘기는
  # 가장 직접적인 권한 몰아주기 행위라 T1098 재사용.
  - id: S13
    name: "cluster-admin 롤 바인딩 부여"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: [rolebindings, clusterrolebindings]
      audit_binding_role_name: "cluster-admin"
    severity: 4
    mitre_technique_id: "T1098"

  # S53 (threshold, threshold=1, 2026-07-18): S6과 같은 T1136(Create Account)이지만
  # 다른 계층 - S6은 K8s API 레벨의 ServiceAccount 생성(k8s_audit)만 본다. 컨테이너
  # "안에서" useradd/adduser/newusers로 OS 레벨 Linux 계정을 만드는 건 K8s 감사로그에
  # 전혀 안 남고, falcosecurity/rules 코어 falco_rules.yaml에도 이 바이너리 계열
  # (passwd_binaries/shadowutils_binaries 리스트는 있지만 "실행되면 알림"이라는 룰
  # 자체가 없음 - 그 리스트들은 "Read sensitive file untrusted"류 룰의 신뢰 프로그램
  # 예외 목록으로만 쓰인다) 대응 룰이 아예 없어서, 이 프로젝트 전용 커스텀 룰
  # (Techeer-12th-b/backend/falco-values.yaml customRules의 rules-account-creation.yaml,
  # 2026-07-18 추가)로 새로 만들었다 - 이 프로젝트 워크로드(Juice Shop, WAF backend)는
  # 전부 stateless 앱이라 정상 운영 중 이 바이너리들이 실행될 이유가 없어 오탐 위험이
  # 낮다.
  #
  # falcosecurity/event-generator + Atomic Red Team(T1136.001 "Create a user account
  # on a Linux system", useradd 원본 그대로) + OWASP ZAP으로 correlation-engine 전체
  # 시나리오를 재검증하다가 발견(2026-07-18, 실측 확인) - useradd로 컨테이너 안에
  # 새 Linux 계정을 만들어도 Falco/correlation-engine 둘 다 완전히 무반응이었다(이중
  # 사각지대). 커스텀 룰을 추가한 뒤에야 이 시나리오로 잡힌다.
  - id: S53
    name: "컨테이너 내부 OS 계정 생성 (백도어 계정 정황)"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Account Creation Inside Container"
    severity: 4
    mitre_technique_id: "T1136"

  # S58 (threshold, threshold=1, 2026-07-18): DataDog stratus-red-team의
  # k8s.privilege-escalation.nodes-proxy 기법(nodes/proxy subresource 권한만 있으면
  # 어드미션 컨트롤과 API 서버 로깅을 우회해 Kubelet API에 직접 접근할 수 있는
  # 권한상승 벡터)을 실제 k3d 클러스터에 재현하며 발견한 사각지대(2026-07-18 실측
  # 확인, 실제로 Kubelet 프록시 성공함).
  #
  # S12(위험한 권한을 가진 RBAC 룰 생성)는 이 권한을 부여하는 ClusterRole 자체를
  # 인식하도록 설계되지 않았다 - 실측 중 이 기법의 ClusterRole(`resources:
  # [nodes/proxy], verbs: [get, create]`)이 S12에서 우연히 걸리긴 했는데, 원인이
  # audit_role_rule_flags_any의 write_verb 플래그가 "create" verb 하나만 있어도
  # 반응하기 때문이지(정확히 확인함) nodes/proxy라는 리소스 자체를 인식해서가
  # 아니다 - 공격에 실제로 필요한 최소 권한(verbs: [get]만)으로 좁히면 S12는 전혀
  # 반응하지 않는다(실제로 이 기법의 detonate 단계는 get만 쓴다). 그래서 이
  # 시나리오는 그 권한을 "부여하는" 시점이 아니라 "실제로 그 권한을 써서 Kubelet을
  # 프록시한" 사용 시점 자체를 본다 - 이 기법의 공식 Detection 문서("Additionally,
  # alerting on objectRef.resource == 'nodes' && objectRef.subresource ==
  # 'proxy' should yield minimal false positives")를 그대로 따른다.
  #
  # MITRE는 이 카탈로그가 처음 쓰는 T1068(Exploitation for Privilege Escalation) -
  # RBAC 자체의 설계상 허점(정상적으로 부여된 권한인데도 어드미션/로깅을 우회하게
  # 되는 API 구조)을 악용한다는 점에서, 컨테이너 스펙의 이스케이프 벡터를 보는
  # S16(T1611)이나 RBAC 오브젝트에 위험한 권한을 부여하는 S12/S13(T1098)과는 다른
  # 각도라 별도 기법으로 잡았다.
  - id: S58
    name: "nodes/proxy 권한상승 악용 정황"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      event_action: "get nodes/proxy"
    severity: 4
    mitre_technique_id: "T1068"
