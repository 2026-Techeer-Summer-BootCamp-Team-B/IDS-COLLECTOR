# Pod/워크로드 생명주기 및 컨테이너 이스케이프 시나리오. 엔진 동작과 설계 근거
# 출처는 ../README.md 참고.

scenarios:
  # S1 (sequence, join_on=pod): 같은 pod에 RBAC로 허용된 exec/attach가 들어온 뒤 그
  # pod 안에서 falco가 쉘 실행/K8s API 접근을 잡으면 발화 - "exec 권한이 실제로
  # 악용됐는지" 확인하는 체인.
  #
  # 원래 버전(join_on=user_or_sa, stage1=RBAC 변경)은 falco의 user.name(컨테이너 내부
  # OS 유저, 예: root)과 k8s_audit의 user.name(RBAC principal, 예:
  # system:serviceaccount:default:app-sa)이 서로 다른 신원 체계라 문자열이 우연히
  # 같을 때만 매칭되는 취약한 조인이었다. falco/k8s_audit(resource=pods)/was·waf
  # (enrichment.py 정적 매핑) 전부 "그 이벤트가 어느 pod에서 일어났는지"
  # (orchestrator.resource.name)는 신뢰성 있게 채우므로 pod을 join_on으로 바꿔 이
  # 문제를 근본적으로 없앴다. RBAC 상승 자체는 rbac.yaml의 S3가 이미(k8s_audit ->
  # k8s_audit, 같은 신원 체계라 안전한 조인) 전담하므로 S1은 그 다음 단계인 "exec
  # 권한 사용 -> 실제 악성 행위"만 맡는다.
  #
  # stage1 = falcosecurity/plugins의 "Attach/Exec Pod" 룰 조건(verb=(create 또는
  # get), resource=pods, subresource=[exec, attach]) 그대로 - 원래 룰 조건이
  # "(kcreate or kget) and subresource in (exec,attach)"인데 verb=create만
  # 옮기고 get을 빠뜨렸었다(재확인 후 수정, 2026-07-12) - verb=get으로 기록되는
  # exec/attach 요청은 create만 보면 이 스테이지가 영원히 안 걸리는 버그였다.
  # mitre_technique_id는 그 룰의 태그가 아니라(태그 없음) MITRE 공식 Containers
  # 매트릭스에서 "kubectl exec류 명령"에 해당하는 T1609(Container Administration
  # Command)를 직접 매칭한 값.
  #
  # stage2 event_action의 "Contact K8S API Server From Container"는 대소문자까지
  # falco_rules.yaml의 룰 이름과 완전히 똑같아야 한다 - normalizer.py가
  # payload["rule"]을 그대로 event.action에 넣고, correlation-engine의
  # _match_value()는 대소문자 구분하는 정확 일치(`in`)라 한 글자만 달라도 stage2가
  # 영원히 안 걸린다. 예전엔 "K8s"(소문자 s)로 적혀 있었는데 실제 Falco 룰 이름은
  # "K8S"(대문자)라 Falco가 정상 탐지해도 S1/S5가 절대 발화하지 않는 버그였다
  # (실측 확인 후 수정, 2026-07-14).
  - id: S1
    name: "Pod Exec 권한 사용 이후 컨테이너 내 이상행동"
    type: sequence
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [k8s_audit, falco]
    window_seconds: 300
    stage1:
      event_module: k8s_audit
      event_action:
        [
          "create pods/exec",
          "create pods/attach",
          "get pods/exec",
          "get pods/attach",
        ]
    stage2:
      event_module: falco
      event_action: ["Terminal shell in container", "Contact K8S API Server From Container"]
    severity: 4
    mitre_technique_id: "T1609"

  # S32 (threshold, join_on=pod, threshold=1, 2026-07-17): T1059(Command and
  # Scripting Interpreter) - falcosecurity/rules 공식 falco_rules.yaml의
  # "Redirect STDOUT/STDIN to Network Connection in Container" 룰을 그대로 가져옴
  # (WebFetch로 원본 재확인, tags: [..., mitre_execution, T1059]) - dup syscall로
  # stdin/stdout을 네트워크 소켓에 연결하는 패턴을 잡는데, 전형적인 리버스 쉘/원격
  # 코드 실행 기법이다. 스톡 룰이 실제로 이 클러스터에서도 발화 중인 걸 라이브
  # 로그로 먼저 확인하고 추가했다(falco-fjsx7 파드 tail 300줄 중 27건, 2026-07-17
  # 실측) - S1(exec 권한 사용 후 이상행동, T1609)과 달리 이건 k8s_audit 없이
  # falco 단독 이벤트만으로도 이미 "리버스 쉘 의심"이라는 충분한 신호라 join_on을
  # pod로 하는 단발성(threshold=1) 시나리오로 별도 뒀다 - S1/S5가 이미 쓰는
  # "Terminal shell in container"와는 다른 룰이라 서로 겹치지 않는다. 원본 룰
  # priority가 NOTICE라 개별 이벤트로는 묻히지만(falco-values.yaml의 "Terminal
  # shell in container" priority 재정의와 같은 문제), 여기서도 그 파일을 건드리는
  # 대신 상관분석 계층에서 severity를 4로 올려 처리한다(같은 컨벤션).
  # ⚠️ 원본 룰 자체가 "behavior-based라 노이즈 발생 가능"이라고 명시하고 있어
  # (user_known_stand_streams_redirect_activities로 튜닝 가능) 오탐 실측이
  # 필요하다.
  - id: S32
    name: "컨테이너 내 리버스 쉘/원격 코드 실행 의심 (stdout/stdin 네트워크 리다이렉트)"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: falco
      event_action: "Redirect STDOUT/STDIN to Network Connection in Container"
    severity: 4
    mitre_technique_id: "T1059"

  # S8 (threshold, join_on=user_or_sa, threshold=1): 네임스페이스 삭제 자체가 이미
  # 파괴적 행위라 단발성 critical로 다룬다(rbac.yaml의 S6과 같은 threshold=1 패턴).
  # 정상 운영에서 네임스페이스 삭제는 드문 이벤트라 verb/resource 조건만으로도
  # 노이즈가 적다 - falcosecurity/plugins의 "K8s Namespace Deleted"(INFO)를 그대로
  # 가져오되, 그 룰은 "일단 로그만 남기는" 목적이라 INFO였고 이 프로젝트에선
  # "발화시켜서 알림까지 보낸다"는 목적이 다르므로 severity를 4로 올렸다.
  - id: S8
    name: "네임스페이스 삭제"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: delete
      orchestrator_resource_type: namespaces
    severity: 4
    mitre_technique_id: "T1485"

  # S14: 이미 떠 있는 pod에 ephemeral container를 추가(patch/update
  # pods/ephemeralcontainers)하면 발화 - falcosecurity/plugins의
  # "EphemeralContainers Created" 룰과 동일 판정. kubectl debug처럼 살아있는 pod에
  # 새 컨테이너를 얹어서 쉘 접근을 얻는 기능이라 exec/attach(S1/rbac.yaml의 S3)와
  # 같은 위협군이라 T1609 재사용.
  - id: S14
    name: "실행 중 pod에 ephemeral container 추가"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      event_action: ["patch pods/ephemeralcontainers", "update pods/ephemeralcontainers"]
    severity: 3
    mitre_technique_id: "T1609"

  # S15: kube-system/kube-public 네임스페이스에 pod가 새로 생성되면 발화 -
  # falcosecurity/plugins의 "Pod Created in Kube Namespace" 룰과 동일 판정(그
  # 룰의 이미지 화이트리스트 제외 조건은 body가 필요해서 뺐다 - rbac.yaml의 S6과
  # 같은 이유로 이 프로젝트는 단일 타깃 데모라 예외 없이 전부 잡는다). 정상
  # 운영에서 시스템 네임스페이스에 워크로드를 새로 심는 경우는 드물어서 S6(시스템
  # 네임스페이스 SA 생성)과 같은 급의 신호 - 컨테이너를 실제로 배포하는 행위라
  # T1610(Deploy Container, Execution)로 분류. 네임스페이스 목록은
  # ids_shared.k8s_constants.SYSTEM_NAMESPACES와 같은 뜻(rbac.yaml S6,
  # severity.yaml에도 같은 목록 - 바뀌면 같이 고칠 것).
  - id: S15
    name: "시스템 네임스페이스에 pod 생성"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: pods
      orchestrator_namespace: [kube-system, kube-public]
    severity: 4
    mitre_technique_id: "T1610"

  # S16 (threshold, threshold=1): pod 생성 요청의 spec에 privileged 컨테이너,
  # hostNetwork/hostPID/hostIPC, 또는 hostPath 볼륨 마운트가 하나라도 있으면
  # 발화 - falcosecurity/plugins의 "Create Privileged Pod"/"Create HostNetwork
  # Pod"/"Create HostPid Pod"/"Create HostIPC Pod"/"Create Sensitive Mount Pod"
  # 5개 룰을 rbac.yaml의 S12처럼 하나로 합쳤다. 전부 컨테이너 격리를 깨고 호스트
  # 커널/파일시스템/네임스페이스에 직접 닿으려는 같은 위협군이라 T1611(Escape to
  # Host, Privilege Escalation)로 묶었다. k3d-audit-policy.yaml에서 pods의
  # create를 Request 레벨로 승격해야만 가능했던 시나리오(../README.md 참고).
  - id: S16
    name: "컨테이너 이스케이프 벡터를 가진 pod 생성"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: pods
      audit_pod_security_flags_any: [privileged, host_network, host_pid, host_ipc, host_path_volume]
    severity: 4
    mitre_technique_id: "T1611"

  # S20 (threshold, threshold=1): DaemonSet 생성 - falcosecurity/plugins의
  # k8s_audit_rules.yaml에는 DaemonSet/CronJob 관련 룰이 아예 없다(2026-07-14 실측
  # 확인, WebFetch로 원본 재확인함) - S1/S3/S6~S18처럼 그 저장소 룰을 옮긴 게
  # 아니라, S10(정찰 burst)과 같은 방식으로 MITRE 공식 기법 설명을 직접 근거로
  # 삼아 이 프로젝트가 설계했다. T1543.005(Container Service, MITRE 공식 페이지:
  # "In Kubernetes environments, DaemonSets allow an adversary to persistently
  # Deploy Containers on all nodes, including ones added later to the cluster")
  # 인용 - 카탈로그(ids_shared.mitre_mapping)는 sub-technique를 안 담는 컨벤션이라
  # 부모 T1543으로 기록. S15(시스템 네임스페이스 pod)와 달리 네임스페이스를
  # 제한하지 않는다 - DaemonSet은 어느 네임스페이스에 만들든 클러스터의 모든
  # 노드에 pod를 하나씩 심는다는 위협 자체가 네임스페이스와 무관해서(S16의
  # Escape to Host급 파급력) 좁히면 핵심 공격 경로를 놓친다.
  - id: S20
    name: "DaemonSet 생성 (전체 노드 지속성 확보)"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: daemonsets
    severity: 4
    mitre_technique_id: "T1543"

  # S21 (threshold, threshold=1): CronJob 생성 - S20과 같은 이유로 falcosecurity/
  # plugins 근거 없이 MITRE 공식 기법 설명을 직접 인용해 설계
  # (T1053.007 Container Orchestration Job, MITRE 공식 페이지: "In Kubernetes,
  # a CronJob may be used to schedule a Job that runs one or more containers...
  # An adversary therefore may utilize a CronJob to schedule deployment of a Job
  # that executes malicious code" - 카탈로그는 부모 T1053으로 기록, S20과 동일
  # 컨벤션). DaemonSet(즉시·전체 노드 장악)보다는 공격 표면이 좁아서(재접속 없이
  # 코드를 반복 실행시키는 "예약된 백도어"에 가까움 - S14 ephemeral container와
  # 비슷한 급) severity는 한 단계 낮춘다.
  - id: S21
    name: "CronJob 생성 (예약 실행 지속성 확보)"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: cronjobs
    severity: 3
    mitre_technique_id: "T1053"
