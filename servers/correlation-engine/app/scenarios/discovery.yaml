# 정찰(reconnaissance) 시나리오. 엔진 동작과 설계 근거 출처는 ../README.md 참고.

scenarios:
  # S10 (threshold, join_on=user_or_sa): 같은 신원이 60초 안에 get/list/watch
  # (severity.yaml 기준 가장 낮은 severity=1, "일반 조회")를 30회 이상 하면 발화 -
  # 정찰(reconnaissance) burst 탐지. ⚠️ 이건 falcosecurity/plugins의 특정 룰에서
  # 가져온 게 아니라 이 프로젝트가 직접 설계한 것이다 - 그 파일엔 "많이 조회하면
  # 의심"이라는 룰 자체가 없다(전부 단건 로그용 INFO 룰뿐). 다만 "짧은 시간에
  # 대량의 조회 API 호출"은 보안 탐지에서 일반적으로 쓰는 정찰 탐지 패턴이라 이
  # 프로젝트 판단으로 추가했다. threshold=30/60초는 임의값 - 정상 운영에서 흔한
  # 컨트롤러/모니터링 도구의 watch 트래픽과 겹칠 수 있어 실측 튜닝이 필요하다
  # (⚠️ false positive 위험 큼).
  - id: S10
    name: "get/list/watch 대량 호출(정찰 정황)"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 30
    cooldown_seconds: 300
    match:
      event_module: k8s_audit
      audit_verb: [get, list, watch]
    severity: 2
    mitre_technique_id: "T1613"

  # S31 (threshold, join_on=user_or_sa, 2026-07-17): T1069(Permission Groups
  # Discovery) - roles/clusterroles/rolebindings/clusterrolebindings에 대한
  # get/list를 짧은 시간에 반복하면 발화. k3d-audit-policy.yaml이 이 4개 리소스를
  # 이미 Request 레벨로 남기고 있어(RBAC 변조 탐지용 S7/S12/S13 재료로 먼저
  # 추가됐던 정책) 새 수집기 없이 바로 쓸 수 있었다. S10(모든 get/list/watch
  # 대량 호출, threshold=30)과 달리 이건 "RBAC 자체를 훑어보는" 훨씬 좁고 목적이
  # 뚜렷한 패턴이라 threshold를 낮게(5) 잡았다 - 정상적인 컨트롤러/모니터링
  # 트래픽이 매 요청마다 자기 role만 확인하는 것과 달리, 공격자의 권한 정찰은
  # 여러 role/binding을 짧은 시간에 훑는 경향이 있다는 가정. ⚠️ S10과 마찬가지로
  # 직접 설계한 임계값이라(falcosecurity/plugins 등 외부 근거 없음) 오탐 실측
  # 튜닝이 필요하다 - 특히 RBAC 관리 도구(예: kubectl-who-can, rbac-lookup)를
  # 쓰는 관리자가 우연히 걸릴 수 있음.
  - id: S31
    name: "RBAC 권한/역할 열거 정황"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 5
    cooldown_seconds: 300
    match:
      event_module: k8s_audit
      audit_verb: [get, list]
      orchestrator_resource_type: [roles, clusterroles, rolebindings, clusterrolebindings]
    severity: 2
    mitre_technique_id: "T1069"

  # S50 (threshold, threshold=1, 2026-07-18): falcosecurity/rules 코어
  # falco_rules.yaml의 "Packet socket created in container" 룰 그대로(WebFetch로
  # 원본 재확인, 태그 mitre_credential_access/T1557.002 - Adversary-in-the-Middle:
  # ARP Cache Poisoning, sub-technique는 이 프로젝트 컨벤션대로 부모 T1557로 기록) -
  # raw AF_PACKET 소켓을 만들면 발화(같은 네트워크 네임스페이스의 트래픽을 스니핑/
  # ARP 스푸핑하려는 정황). 원본 태그는 credential_access지만 실질 행위(네트워크
  # 트래픽 도청)가 이 파일의 다른 시나리오(정찰)와 성격이 더 가까워 discovery.yaml에
  # 둔다 - S40과 같은 실측 확인(2026-07-17)에서 발견.
  - id: S50
    name: "컨테이너 내 Raw 패킷 소켓 생성 (스니핑/ARP 스푸핑 정황)"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Packet socket created in container"
    severity: 3
    mitre_technique_id: "T1557"

  # S62 (sequence, join_on=user_or_sa, window_seconds=1800, 2026-07-19, Notion
  # "여러 계층 시나리오" M19 구현, S31 후속): S10/S31(둘 다 threshold) 같은
  # "빠르게 많이"에만 반응하는 시나리오는 정찰 사실을 아는 공격자가 임계값 아래로
  # 속도를 늦추면(low-and-slow) 아무것도 못 잡는다 - 이건 "빈도"가 아니라 "정찰
  # 이후의 인과관계"를 신호로 쓴다: RBAC를 한 번이라도 훑어본 신원이 그 뒤 훨씬
  # 넓은 시간창(1800초) 안에 민감 리소스에 단 한 번만 접근해도 매칭한다.
  #
  # ⚠️ 원안(Notion 문서)은 stage1을 "S31 재료(threshold=5/60s)가 이미 발화한
  # 상태"로 적었는데, 그대로는 구현 불가능하다 - sequence의 stageN은 이벤트 한
  # 건이 패턴에 맞는지만 보는 정적 매칭(_matches())이라, "같은 패턴이 60초 안에
  # 5번 반복됐는지"(threshold의 Redis 카운터 로직)를 스테이지 조건으로 가져올
  # 수가 없다(M48이 지적한 "시퀀스 안에 threshold/cardinality를 중첩" 문제와 같은
  # 엔진 제약). 그래서 stage1은 S31의 threshold(5회)가 아니라 S31의 match 패턴
  # (roles/clusterroles/rolebindings/clusterrolebindings의 get/list) 자체를
  # 단발 이벤트로 재사용한다 - 오히려 이게 원안의 취지에 더 맞다: stage1에 5회
  # 임계값을 그대로 요구하면 그 자체가 병목이 되어 "임계값 아래로 속도를 늦추는"
  # 공격자를 여전히 놓치게 된다. stage2(민감 리소스 접근)가 실질적인 노이즈
  # 필터 역할을 하므로 stage1을 단발로 완화해도 무분별하게 발화하지 않는다.
  #
  # stage2 "민감 리소스(secrets get, RBAC 변경 등)"는 두 갈래 - S2가 쓰는 secrets
  # get/list와 S3가 쓰는 RBAC 오브젝트 변경(clusterroles/clusterrolebindings/
  # roles/rolebindings의 create/delete/deletecollection/patch/update, S3 stage1과
  # 동일 verb 범위 - deletecollection을 빠뜨리면 안 된다는 게 S3 주석의 교훈)을
  # event_action 리스트 하나로 합쳤다(S1 stage1/S61 stage2와 같은 "여러 verb x
  # resource 조합을 event_action 리스트로" 패턴 - audit_verb+orchestrator_resource_type
  # 필드를 따로 쓰면 두 갈래가 서로의 verb/resource와 원치 않게 교차 매칭될 수
  # 있어(예: get secrets가 아니라 delete secrets까지 잡히는 식) 이 방식을 피했다).
  #
  # mitre_technique_id=T1069: stage2가 실제로는 T1552(자격증명 접근)/T1098(RBAC
  # 권한 부여)까지 걸치는 혼합 신호지만, 이 시나리오의 정체성은 "S31의 후속"이라는
  # 데 있어 S31의 기법 태그를 그대로 물려받는다 - S60/S61이 각각의 원조 시나리오
  # 태그를 재사용한 것과 같은 컨벤션. severity=4는 S1/S3/S61과 같은 논리 - 정찰
  # 단독(S31, severity=2)보다 "정찰 이후 실제 접근까지 확인됐다"는 확정적 체인이라
  # 한 단계 올려 잡는다.
  - id: S62
    name: "RBAC 열거 정찰 이후 저빈도 민감 리소스 접근 (threshold 우회 대응)"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 1800
    stage1:
      event_module: k8s_audit
      audit_verb: [get, list]
      orchestrator_resource_type: [roles, clusterroles, rolebindings, clusterrolebindings]
    stage2:
      event_module: k8s_audit
      event_action:
        [
          "get secrets",
          "list secrets",
          "create clusterroles",
          "delete clusterroles",
          "deletecollection clusterroles",
          "patch clusterroles",
          "update clusterroles",
          "create clusterrolebindings",
          "delete clusterrolebindings",
          "deletecollection clusterrolebindings",
          "patch clusterrolebindings",
          "update clusterrolebindings",
          "create roles",
          "delete roles",
          "deletecollection roles",
          "patch roles",
          "update roles",
          "create rolebindings",
          "delete rolebindings",
          "deletecollection rolebindings",
          "patch rolebindings",
          "update rolebindings",
        ]
    severity: 4
    mitre_technique_id: "T1069"

  # S79 (threshold, join_on=user_or_sa, 2026-07-20, Notion "여러 계층 시나리오" M82
  # 구현, DET0587 기반, S10 정밀화): MITRE 공식 DET0587(AN1616)은 "짧은 시간 안에
  # 여러 계정 객체를 조회하는 API 호출"을 계정 탐색의 핵심 지표로 명시한다 -
  # `S10`(get/list/watch 전체 대량 호출, threshold=30)은 pods/secrets/services
  # 등을 뭉뚱그려 세는데, 이건 "계정(서비스어카운트) 자체를 노리는 열거"만 좁혀서
  # 본다는 점에서 더 특화된 신호 - M50(distinct 리소스 타입 다양성 자체가 신호)과는
  # 반대로, 여긴 특정 타입 하나(serviceaccounts)의 반복 횟수 자체를 본다.
  #
  # threshold=10/60s는 S10(30)보다 낮다 - serviceaccounts만 좁혀서 세므로 정상
  # 운영에서 도달하기 더 어려운 문턱이라 판단했다(S31의 5와 S10의 30 사이 - S31처럼
  # RBAC 오브젝트만 보는 좁은 스코프에 더 가깝지만 serviceaccounts는 RBAC
  # 오브젝트(role/binding)보다 정상 조회 빈도가 조금 더 높을 수 있어 중간값을
  # 택함). ⚠️ 다른 threshold 시나리오와 같은 이유로 실측 튜닝 필요.
  #
  # mitre_technique_id=T1087(Account Discovery)은 CONTAINERS_MATRIX(30개) 밖
  # 기법이지만 MITRE 공식 문서를 직접 인용 - S28/S36/S40/S44/S50/S70/S71/S77이
  # 이미 쓰는 "카탈로그 밖 기법 사용" 관례와 동일. severity=2는 S10/S31과 같은
  # 급(정찰 단계, 아직 실공격 아님).
  - id: S79
    name: "서비스어카운트 대량 열거 탐지"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 10
    cooldown_seconds: 300
    match:
      event_module: k8s_audit
      audit_verb: [get, list]
      orchestrator_resource_type: serviceaccounts
    severity: 2
    mitre_technique_id: "T1087"

  # S91 (cardinality, join_on=user_or_sa, 2026-07-20, Notion "여러 계층 시나리오"
  # M52 구현, 엔진 확장 포함): 하루 이틀의 정찰은 우연일 수 있지만, 같은 신원이
  # 여러 날에 걸쳐 반복적으로 정찰 패턴을 보이면 지속적으로 침투 기회를 노리는
  # 내부자 또는 장기 잠복 위협일 가능성이 높다 - 지금까지의 모든 M은
  # window_seconds가 최대 1800초(M19) 수준인데, 이건 "일" 단위의 훨씬 긴 시간창을
  # 쓴다는 점에서 근본적으로 다른 시간 스케일이다.
  #
  # ⚠️ 원안이 우려한 두 가지를 재검토했다:
  #   - "_RECENCY_MARKER_TTL_SECONDS(900초)와 충돌": 기우였다 - 그 상한은
  #     absent_recent_module 전용이고 cardinality의 window_seconds와는 무관하다.
  #     Redis의 EXPIRE는 며칠짜리 TTL도 문제없이 처리한다.
  #   - 진짜 막힌 지점은 distinct_field였다 - "정찰이 발화한 날짜(day bucket)"는
  #     NormalizedEvent에 없는 파생 값이라 그대로 못 썼다. ids_shared/schemas.py에
  #     순수 Python @property `event_date`(timestamp의 날짜 부분, "YYYY-MM-DD")를
  #     추가했다(2026-07-20, 와이어 포맷 변경 없음 - normalizer/correlation-engine
  #     양쪽이 이미 가진 timestamp에서 각자 계산). `_eval_cardinality`가 getattr()로
  #     읽으므로 rules.py 자체는 변경이 필요 없었다.
  #   - 원안 예시값(window_seconds=86400=1일)도 그대로는 말이 안 됐다 - 1일짜리
  #     창 안에서는 "서로 다른 날짜"가 최대 1~2개(UTC 경계 걸침)뿐이라 day-bucket
  #     cardinality 자체가 성립하지 않는다. window_seconds=604800(7일)로 넓혀
  #     "일주일 중 최소 3일에 정찰 패턴"으로 재정의했다.
  #
  # match는 S10(모든 get/list/watch, threshold=30/60s)의 조건을 그대로 재사용한다 -
  # S31보다 넓은 정의라 "정찰류 활동이 있었던 날"을 폭넓게 잡는다.
  # mitre_technique_id=T1613: S10의 태그를 그대로 물려받는다. severity=3은
  # S10/S31(단발 burst, 2)보다 위 - 여러 날에 걸친 지속성이 확인됐다는 확실성이
  # 더해져서다.
  - id: S91
    name: "반복적 정찰-침해 사이클 탐지 (여러 날에 걸친 정찰 재발생)"
    type: cardinality
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 604800
    threshold: 3
    cooldown_seconds: 86400
    distinct_field: event_date
    match:
      event_module: k8s_audit
      audit_verb: [get, list, watch]
    severity: 3
    mitre_technique_id: "T1613"
