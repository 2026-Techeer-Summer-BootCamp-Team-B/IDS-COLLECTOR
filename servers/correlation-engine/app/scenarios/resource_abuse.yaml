# 컨테이너 런타임 리소스 남용(크립토마이닝) 시나리오. 엔진 동작과 설계 근거
# 출처는 ../README.md 참고.

scenarios:
  # S22 (threshold, threshold=1): 컨테이너 안에서 크립토마이닝 정황(마이너 풀
  # 접속/Stratum 프로토콜/알려진 마이너 바이너리 실행) 중 하나라도 감지되면
  # 발화 - S1/S3/S6~S18처럼 falcosecurity 근거를 옮긴 시나리오지만, 이번엔
  # k8s_audit 전용인 falcosecurity/plugins가 아니라 falcosecurity/rules 저장소의
  # falco-sandbox_rules.yaml에 있는 3개 룰(Detect outbound connections to
  # common miner pool ports / Detect crypto miners using the Stratum protocol /
  # Known Cryptominer Process Executed)을 그대로 옮겼다(2026-07-14, WebFetch로
  # 원본 재확인 - 지어낸 게 아님). Target 저장소의 backend/falco-values.yaml
  # customRules에 룰 본문을 추가했고, 그중 "outbound connections" 룰은 원본이
  # enabled: false(오탐 방지 기본값)라 명시적으로 켰다. 3개 룰 전부 CRITICAL
  # priority라 threshold=1(단발성)로 다룬다 - S6/S8 등과 같은 패턴.
  - id: S22
    name: "컨테이너 내 크립토마이닝 정황"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action:
        [
          "Detect outbound connections to common miner pool ports",
          "Detect crypto miners using the Stratum protocol",
          "Known Cryptominer Process Executed",
        ]
    severity: 4
    mitre_technique_id: "T1496"
