# 컨테이너 런타임 리소스 남용(크립토마이닝) 시나리오. 엔진 동작과 설계 근거
# 출처는 ../README.md 참고.

scenarios:
  # S22 (threshold, threshold=1): 컨테이너 안에서 크립토마이닝 정황(마이너 풀
  # 접속/Stratum 프로토콜/알려진 마이너 바이너리 실행) 중 하나라도 감지되면
  # 발화 - S1/S3/S6~S18처럼 falcosecurity 근거를 옮긴 시나리오지만, 이번엔
  # k8s_audit 전용인 falcosecurity/plugins가 아니라 falcosecurity/rules 저장소의
  # falco-sandbox_rules.yaml에 있는 3개 룰(Detect outbound connections to
  # common miner pool ports / Detect crypto miners using the Stratum protocol /
  # Known Cryptominer Process Executed)을 그대로 옮겼다(2026-07-14, WebFetch로
  # 원본 재확인 - 지어낸 게 아님). Target 저장소의 backend/falco-values.yaml
  # customRules에 룰 본문을 추가했고, 그중 "outbound connections" 룰은 원본이
  # enabled: false(오탐 방지 기본값)라 명시적으로 켰다. 3개 룰 전부 CRITICAL
  # priority라 threshold=1(단발성)로 다룬다 - S6/S8 등과 같은 패턴.
  - id: S22
    name: "컨테이너 내 크립토마이닝 정황"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action:
        [
          "Detect outbound connections to common miner pool ports",
          "Detect crypto miners using the Stratum protocol",
          "Known Cryptominer Process Executed",
        ]
    severity: 4
    mitre_technique_id: "T1496"

  # S82 (sequence, join_on=user_or_sa, 3단계, 2026-07-20, Notion "여러 계층
  # 시나리오" M6 구현): 파일 업로드 → 실행/크립토마이닝 → CronJob 지속성 확보를
  # 하나의 킬체인으로 엮는다. stage2(`S22`, 크립토마이닝)/stage3(`S21`, CronJob
  # 생성)는 이미 실측 검증까지 끝난 재료다 - 이 시나리오의 신규 기여는 stage1
  # (업로드 탐지)뿐이다.
  #
  # stage1의 url_path_prefix="/file-upload"는 이 프로젝트가 배포하는 Target인
  # OWASP Juice Shop 자체의 실제 업로드 엔드포인트다(multer 미들웨어 기반, POST -
  # 추측이 아니라 이 오픈소스 앱의 공개된 실제 구조) - "비정상 확장자/더블
  # 익스텐션"까지는 못 본다(_MATCHERS에 접미사/정규식 매처가 없음, url_path_prefix는
  # 앞부분만 검사) - 업로드 엔드포인트에 대한 성공 응답 자체를 stage1으로 근사했다.
  #
  # join_on=user_or_sa: stage1(WAF/WAS, enrichment.py가 대상 pod에 정적으로
  # 매핑해둔 actor_identity)과 stage2(Falco, 같은 pod의 actor_identity)까지는
  # `S5`/`S81`이 이미 증명한 join_on=pod로도 이어질 수 있지만, stage3(K8s Audit
  # CronJob 생성)의 orchestrator_resource_name은 CronJob 자신의 이름이지 pod가
  # 아니라서 pod 축으로는 안 이어진다 - `S59`가 이미 증명한 것과 같은
  # actor_identity → user.name 브릿지(같은 신원이 침해된 pod의 토큰으로 K8s API를
  # 호출했다는 전제)로 3단계 전체를 user_or_sa 하나로 통일했다.
  #
  # mitre_technique_id=T1496: stage2(S22)의 태그를 물려받는다 - "크립토마이닝
  # 감염"이 이 시나리오의 헤드라인(M6 원문 제목의 중심)이고 stage3(CronJob)은 그
  # 감염이 지속성 확보로 이어졌다는 확인 단계. severity=4는 S22(4)와 같은 급 -
  # S21 단독(3)보다 위인 이유는 감염이 실제로 지속성 확보까지 이어졌다는
  # 확정적 킬체인이라서다.
  - id: S82
    name: "파일 업로드 → 실행/크립토마이닝 → CronJob 지속성 확보 (WAF/WAS → Falco → K8s Audit)"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [was, falco, k8s_audit]
    window_seconds: 300
    stage1:
      event_module: was
      url_path_prefix: "/file-upload"
      http_request_method: POST
      http_response_status_code: [200, 201]
    stage2:
      event_module: falco
      event_action:
        [
          "Detect outbound connections to common miner pool ports",
          "Detect crypto miners using the Stratum protocol",
          "Known Cryptominer Process Executed",
        ]
    stage3:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: cronjobs
    severity: 4
    mitre_technique_id: "T1496"
