# 자격증명 접근/노출 시나리오. 엔진 동작과 설계 근거 출처는 ../README.md 참고.

scenarios:
  # S2 (sequence, join_on=user_or_sa): 같은 user/SA가 시크릿을 조회(자격증명 정찰)한
  # 뒤 pod/deployment를 삭제(흔적 인멸 시도)하면 발화.
  # 예전 버전은 stage2가 was였는데, normalizer가 was 이벤트에 user.name을 채우지
  # 않아(nginx access log엔 k8s RBAC 신원 정보가 없음) join_key가 항상 None ->
  # stage2가 절대 매칭되지 않는 버그였다. k8s_audit -> k8s_audit 체인으로 교체.
  #
  # 시크릿 enumeration 정교화는 검토 결과 보류 - falcosecurity/plugins의 실제 룰도
  # "시크릿 get 성공/실패"뿐이라 "전체 네임스페이스 열거"를 구분할 근거가 없어서
  # 지어내지 않고 이 형태(get/list secrets)를 그대로 둔다.
  - id: S2
    name: "자격증명 조회 이후 흔적 삭제 시도"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 600
    stage1:
      event_module: k8s_audit
      event_action: ["get secrets", "list secrets"]
    stage2:
      event_module: k8s_audit
      event_action: ["delete pods", "delete deployments"]
    severity: 3
    mitre_technique_id: "T1552"

  # S18 (threshold, threshold=1): ConfigMap의 data/binaryData에 평문 자격증명으로
  # 보이는 문자열이 있으면 발화 - falcosecurity/plugins의 "Create/Modify Configmap
  # With Private Credentials" 룰의 contains_private_credentials 매크로를 그대로
  # 옮김(aws_access_key_id/aws-access-key-id/aws_s3_access_key_id/
  # aws-s3-access-key-id/password/passphrase 문자열 포함 여부, 대소문자 구분
  # 그대로). Secret과 달리 ConfigMap은 암호화·난독화 없이 저장되므로 이건 시크릿을
  # 조회하는 것(S2, Credential Access)과 달리 "자격증명을 애초에 안전하지 않은
  # 곳에 노출시킨" 사고라 T1552(Unsecured Credentials) 재사용.
  - id: S18
    name: "ConfigMap 평문 자격증명 노출"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: [create, update, patch]
      orchestrator_resource_type: configmaps
      audit_configmap_has_credentials: true
    severity: 4
    mitre_technique_id: "T1552"

  # S38 (threshold, threshold=1, 2026-07-18): falcosecurity/rules 코어 falco_rules.yaml의
  # "Find AWS Credentials" 룰 그대로(WebFetch로 원본 재확인, 태그
  # mitre_credential_access/T1552) - 컨테이너 내에서 grep/find로 AWS 자격증명 표준
  # 저장 위치를 뒤지면 발화. S2(시크릿 조회, k8s API 계층)와 달리 이건 컨테이너
  # 파일시스템 안에서의 자격증명 탐색(런타임 계층)이라 서로 다른 신호 - 같은 T1552를
  # 다른 계층에서 재확인하는 이중화. 실측 확인(2026-07-17, event-generator 전체
  # 카탈로그 검증 중)에서 falco가 탐지하고 있었는데 대응 시나리오가 없었던 걸 발견.
  - id: S38
    name: "컨테이너 내 AWS 자격증명 탐색 정황"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Find AWS Credentials"
    severity: 3
    mitre_technique_id: "T1552"

  # S39 (threshold, threshold=1, 2026-07-18): falcosecurity/rules 코어 falco_rules.yaml의
  # "Search Private Keys or Passwords" 룰 그대로(WebFetch로 원본 재확인, 태그
  # mitre_credential_access/T1552.001) - grep/find로 개인키/비밀번호 패턴을 뒤지면
  # 발화. sub-technique를 안 담는 이 프로젝트 컨벤션대로(S20/S21/S25/S29와 동일)
  # 부모 T1552로 기록 - S38과 기법은 같지만(T1552) AWS 특정 위치가 아니라 SSH
  # 개인키/일반 비밀번호 패턴을 노리는 별개 정찰이라 분리. S38과 같은 실측 확인
  # (2026-07-17)에서 발견.
  - id: S39
    name: "컨테이너 내 개인키/비밀번호 탐색 정황"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Search Private Keys or Passwords"
    severity: 3
    mitre_technique_id: "T1552"

  # S45~S49 (threshold, threshold=1, 2026-07-18): falcosecurity/rules 코어
  # falco_rules.yaml의 "민감 파일 접근" 계열 5개 룰을 그대로(WebFetch로 원본
  # 재확인, 전부 태그 mitre_credential_access/T1555 - Credentials from Password
  # Stores) - S38/S39(컨테이너 안에서 자격증명을 "찾는" 능동적 탐색 행위)와 달리
  # 이 5개는 민감 파일(/etc/shadow류) 자체에 대한 접근/우회 시도를 각각 다른
  # 각도에서 잡는다. S40과 같은 실측 확인(2026-07-17)에서 발견 - falco가 다 잡고
  # 있었는데 대응 시나리오가 없었다.
  - id: S45
    name: "신뢰되지 않은 프로세스의 민감 파일 열람"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Read sensitive file untrusted"
    severity: 3
    mitre_technique_id: "T1555"

  # S46/S47: 민감 파일에 하드링크/심링크를 만드는 건 접근 제어를 우회해서 다른
  # 경로로 같은 파일을 읽거나, 원본 파일이 지워져도 내용을 보존하려는 시도다.
  - id: S46
    name: "민감 파일에 하드링크 생성 시도"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Create Hardlink Over Sensitive Files"
    severity: 3
    mitre_technique_id: "T1555"

  - id: S47
    name: "민감 파일에 심볼릭링크 생성 시도"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Create Symlink Over Sensitive Files"
    severity: 3
    mitre_technique_id: "T1555"

  - id: S48
    name: "신뢰된 프로세스의 뒤늦은 민감 파일 열람"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Read sensitive file trusted after startup"
    severity: 3
    mitre_technique_id: "T1555"

  - id: S49
    name: "경로 탐색을 통한 민감 파일 접근 시도"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "Directory traversal monitored file read"
    severity: 3
    mitre_technique_id: "T1555"

  # S56 (threshold, threshold=1, 2026-07-18): DataDog stratus-red-team의
  # k8s.credential-access.steal-serviceaccount-token 기법(pod에 exec해서 `cat
  # /var/run/secrets/kubernetes.io/serviceaccount/token`으로 마운트된 토큰을 그대로
  # 읽어감)을 실제 k3d 클러스터에 재현하며 발견한 사각지대(2026-07-18 실측 확인) -
  # k8s_audit은 "create pods/exec" 요청이 있었다는 것만 남기고 그 안에서 무슨 명령을
  # 실행했는지는 모르므로(S1의 stage1과 이벤트가 동일해 구분 불가), 이 절도 자체를
  # 잡으려면 falco의 파일 열람 신호가 필요했다. falcosecurity/rules 코어
  # falco_rules.yaml의 sensitive_files 매크로(/etc/shadow 등 전통적 리눅스 경로)에는
  # 이 K8s 전용 경로가 없어 대응 룰이 없었다(WebFetch로 원본 재확인) - S53(계정
  # 생성)과 같은 이유로 Techeer-12th-b/backend/falco-values.yaml에 전용 커스텀 룰
  # (rules-token-theft.yaml, "ServiceAccount Token File Read")을 추가한 뒤에야
  # 실측으로 잡을 수 있었다. join_on=pod - 토큰을 읽어간 그 파드 자체가
  # correlation_key_value(orchestrator.resource.name)가 된다. severity는 "찾는"
  # 행위인 S38/S39(아직 못 찾았을 수도 있음, 3)보다 위 - 이건 이미 실제로 쓸 수 있는
  # 신원을 확보한 완료된 절도라 노출 자체인 S18과 같은 급(4)으로 잡는다.
  - id: S56
    name: "ServiceAccount 토큰 파일 탈취 정황"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: falco
      event_action: "ServiceAccount Token File Read"
    severity: 4
    mitre_technique_id: "T1552"

  # S89 (threshold, threshold=1, 2026-07-20, Notion "여러 계층 시나리오" M85 구현,
  # DET0198 기반): MITRE 공식 DET0198(AN0571)은 "kubectl logs/docker logs류 API
  # 호출"을 자격증명 접근 벡터로 명시한다 - 애플리케이션이 실수로 환경변수나
  # 토큰을 stdout에 출력하는 경우가 흔해서, 로그 조회 자체가 exec 못지않게
  # 위험한 수집 경로가 될 수 있다. `pods/log` 서브리소스는 이 카탈로그가 지금까지
  # 다룬 적 없는 신규 리소스 타입 - `S1`(pods/exec·attach)과 나란히 둘 자매
  # 시나리오다.
  #
  # k3d-audit-policy.yaml에 pods/log 전용 규칙은 없지만, GET 요청은 마지막
  # catch-all(level: Metadata, "나머지 API 호출(조회 포함)도 기본적으로 수집")이
  # 이미 잡고 있어 정책 변경 없이 바로 쓸 수 있다.
  #
  # join_on=pod는 S1과 같은 이유 - pods 서브리소스 액션은 orchestrator_resource_name에
  # pod 이름을 신뢰성 있게 담는다. severity=3은 S38/S39(자격증명을 "찾는" 행위,
  # 아직 실제로 찾았는지 불확실)와 같은 급 - S1(exec 확인, 4)보다는 낮다.
  # mitre_technique_id=T1552는 sub-technique(T1552.007)를 안 담는 이 카탈로그
  # 컨벤션대로 부모 기법으로 기록.
  - id: S89
    name: "컨테이너 로그 조회를 통한 자격증명 유출 탐지"
    type: threshold
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      event_action: "get pods/log"
    severity: 3
    mitre_technique_id: "T1552"

  # S99 (cardinality, join_on=pod, 2026-07-20, Notion "여러 계층 시나리오" M35
  # 구현, S45~S49 재활용): S45~S49는 각각 독립적으로 threshold=1 즉시 발화한다 -
  # 그런데 짧은 시간 안에 이 5개 중 서로 다른 룰이 여러 개 동시에 뜨면(예: "신뢰
  # 안 된 프로세스의 민감 파일 열람"[S45] + "하드링크 생성"[S46] + "심볼릭링크
  # 생성"[S47]이 한 pod에서 몇 분 안에 다 뜸), 단발성 우연이 아니라 조직적인
  # 자격증명 수집 활동이라는 훨씬 강한 신호가 된다. S45~S49를 대체하지 않고
  # (개별 발화는 그대로 유지) 그 5개 신호의 "다양성 자체"를 distinct_field로
  # 얹어서 보는 별개 시나리오다.
  #
  # `S90`(M32, join_on=rule_id로 "같은 시그니처가 여러 pod에 퍼지는지"를 봄)과
  # 짝을 이루는 아이디어지만 반대 축이다 - S90은 join_on을 시그니처로 바꾸고
  # distinct_field로 대상(pod)의 다양성을 세는데, 이건 join_on을 그대로
  # pod(어디서 벌어졌는지)에 두고 distinct_field로 시그니처(event_action) 자체의
  # 다양성을 센다 - "한 곳에서 여러 종류의 공격 흔적이 겹치는지"를 보는 셈이라
  # S90과 정확히 대칭되는 질문.
  #
  # distinct_field=event_action - 새 필드가 필요 없었다(schemas.py의 공통 필드,
  # falco 이벤트는 이미 event.action에 룰 이름을 그대로 채운다). match의
  # event_action 리스트로 S45~S49의 정확한 5개 문자열만 골라 셀 대상 자체를
  # 좁힌다 - 다른 falco 룰까지 섞이면 "민감 파일 관련 신호들의 다양성"이라는
  # 이 시나리오의 의미가 흐려진다.
  #
  # threshold=3/window_seconds=300("몇 분 안에")은 티켓 예시(3개 룰 동시 발화)를
  # 그대로 따랐다 - 5개 중 3개면 우연한 중복(예: 같은 파일에 여러 접근 방식이
  # 우연히 겹침)보다 "여러 각도에서 계속 민감 파일에 접근을 시도하고 있다"는
  # 패턴으로 보기에 충분하다고 판단했다. cooldown_seconds=900은 S45~S49
  # 개별(600)보다 길게 잡았다 - 이건 이미 여러 신호가 겹친 뒤의 "확정적 조직
  # 활동" 판정이라, 같은 pod에서 계속 이어지는 동안 매번 새 인시던트로 쪼개기보다
  # 조사 시간을 벌어주는 쪽을 택했다(S96과 같은 논리).
  #
  # mitre_technique_id=T1555: S45~S49 5개 전부 이미 이 태그를 쓰고 있어 그대로
  # 물려받는다(모호함 없음). severity=4는 S45~S49(전부 3)보다 위 - 개별 신호
  # 하나하나보다 "짧은 시간에 여러 각도에서 동시다발적으로 확인됐다"는 응집이
  # 훨씬 확정적인 증거라는 게 이 카탈로그 전반의 일관된 논리(S62가 S31 대비,
  # S93/S94가 각자의 전조 대비 severity를 올린 것과 동일).
  - id: S99
    name: "다종 민감 파일 접근 룰의 동시다발 발화 (조직적 자격증명 수집 정황)"
    type: cardinality
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [falco]
    window_seconds: 300
    threshold: 3
    cooldown_seconds: 900
    distinct_field: event_action
    match:
      event_module: falco
      event_action:
        [
          "Read sensitive file untrusted",
          "Create Hardlink Over Sensitive Files",
          "Create Symlink Over Sensitive Files",
          "Read sensitive file trusted after startup",
          "Directory traversal monitored file read",
        ]
    severity: 4
    mitre_technique_id: "T1555"
