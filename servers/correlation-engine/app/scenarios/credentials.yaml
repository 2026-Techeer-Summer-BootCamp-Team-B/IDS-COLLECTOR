# 자격증명 접근/노출 시나리오. 엔진 동작과 설계 근거 출처는 ../README.md 참고.

scenarios:
  # S2 (sequence, join_on=user_or_sa): 같은 user/SA가 시크릿을 조회(자격증명 정찰)한
  # 뒤 pod/deployment를 삭제(흔적 인멸 시도)하면 발화.
  # 예전 버전은 stage2가 was였는데, normalizer가 was 이벤트에 user.name을 채우지
  # 않아(nginx access log엔 k8s RBAC 신원 정보가 없음) join_key가 항상 None ->
  # stage2가 절대 매칭되지 않는 버그였다. k8s_audit -> k8s_audit 체인으로 교체.
  #
  # 시크릿 enumeration 정교화는 검토 결과 보류 - falcosecurity/plugins의 실제 룰도
  # "시크릿 get 성공/실패"뿐이라 "전체 네임스페이스 열거"를 구분할 근거가 없어서
  # 지어내지 않고 이 형태(get/list secrets)를 그대로 둔다.
  - id: S2
    name: "자격증명 조회 이후 흔적 삭제 시도"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 600
    stage1:
      event_module: k8s_audit
      event_action: ["get secrets", "list secrets"]
    stage2:
      event_module: k8s_audit
      event_action: ["delete pods", "delete deployments"]
    severity: 3
    mitre_technique_id: "T1552"

  # S18 (threshold, threshold=1): ConfigMap의 data/binaryData에 평문 자격증명으로
  # 보이는 문자열이 있으면 발화 - falcosecurity/plugins의 "Create/Modify Configmap
  # With Private Credentials" 룰의 contains_private_credentials 매크로를 그대로
  # 옮김(aws_access_key_id/aws-access-key-id/aws_s3_access_key_id/
  # aws-s3-access-key-id/password/passphrase 문자열 포함 여부, 대소문자 구분
  # 그대로). Secret과 달리 ConfigMap은 암호화·난독화 없이 저장되므로 이건 시크릿을
  # 조회하는 것(S2, Credential Access)과 달리 "자격증명을 애초에 안전하지 않은
  # 곳에 노출시킨" 사고라 T1552(Unsecured Credentials) 재사용.
  - id: S18
    name: "ConfigMap 평문 자격증명 노출"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: [create, update, patch]
      orchestrator_resource_type: configmaps
      audit_configmap_has_credentials: true
    severity: 4
    mitre_technique_id: "T1552"
