# WAF/외부 노출 경로 시나리오. 엔진 동작과 설계 근거 출처는 ../README.md 참고.

scenarios:
  # S4 (threshold, join_on=source_ip): 같은 IP에서 60초 안에 WAF 이벤트가 5건 이상
  # 발생하면 발화, 발화 후 300초 쿨다운.
  - id: S4
    name: "동일 IP WAF 다발 차단"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 5
    cooldown_seconds: 300
    match:
      event_module: waf
    severity: 3
    mitre_technique_id: "T1190"

  # S5 (sequence, join_on=pod): WAF가 CRITICAL로 판정한 공격이 같은 pod 안에서 falco
  # 쉘 실행/K8s API 접근으로 이어지는지 확인 - "외부 공격이 실제 침투로 이어졌는가"를
  # 다루는 체인. S4(threshold)는 단순히 WAF 히트 건수만 세지만, S5는 그 공격이
  # 실제로 성공해서 컨테이너 내부까지 침투했는지를 본다. join_on=pod는 workload.yaml의
  # S1과 같은 근거로 성립 - waf/falco 둘 다 orchestrator.resource.name을 신뢰성
  # 있게 채운다(waf는 enrichment.py 정적 매핑, falco는 k8s.pod.name).
  - id: S5
    name: "WAF CRITICAL 차단 이후 실제 컨테이너 침투 확인"
    type: sequence
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [waf, falco]
    window_seconds: 300
    stage1:
      event_module: waf
      min_severity: 4
    stage2:
      event_module: falco
      event_action: ["Terminal shell in container", "Contact K8s API Server From Container"]
    severity: 4
    mitre_technique_id: "T1190"

  # S17 (threshold, threshold=1): NodePort Service가 생성되거나 기존 Service가
  # NodePort로 바뀌면 발화 - falcosecurity/plugins의 "Create NodePort Service" 룰과
  # 동일 판정에 더해, ClusterIP로 만든 뒤 patch/update로 NodePort로 바꾸는 경로까지
  # 잡는다(k3d-audit-policy.yaml이 services의 update/patch도 Request 레벨로 남기도록
  # 확장됨, 2026-07-12 - spec.type은 pod의 hostNetwork류와 달리 생성 후에도 바뀔 수
  # 있는 필드라 create만 보면 놓쳤다). 그 룰의 제외 조건 user_known_node_port_service
  # 매크로는 원본에서도 "(k8s_audit_never_true)"로 정의돼 있어 사실상 항상 거짓이다 -
  # 즉 원본 룰 자체가 예외 없이 모든 NodePort 생성을 잡는다(우리가 예외를 뺀 게
  # 아니라 원본이 그렇다). NodePort는 클러스터 밖에서 모든 노드의 고정 포트로 직접
  # 접근 가능한 경로를 새로 만드는 것이라 T1133(External Remote Services, rbac.yaml의
  # S9와 동일 기법) 재사용 - 둘 다 "클러스터 경계 밖에서 접근 가능한 새 경로가
  # 생겼다"는 같은 위협.
  - id: S17
    name: "NodePort Service 노출"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: [create, update, patch]
      orchestrator_resource_type: services
      audit_service_type: NodePort
    severity: 3
    mitre_technique_id: "T1133"
