# WAF/WAS/외부 노출 경로 시나리오. 엔진 동작과 설계 근거 출처는 ../README.md 참고.

scenarios:
  # S4 (threshold, join_on=source_ip): 같은 IP에서 60초 안에 WAF 이벤트가 5건 이상
  # 발생하면 발화, 발화 후 300초 쿨다운.
  - id: S4
    name: "동일 IP WAF 다발 차단"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 5
    cooldown_seconds: 300
    match:
      event_module: waf
    severity: 3
    mitre_technique_id: "T1190"

  # S5 (sequence, join_on=pod): WAF가 CRITICAL로 판정한 공격이 같은 pod 안에서 falco
  # 쉘 실행/K8s API 접근으로 이어지는지 확인 - "외부 공격이 실제 침투로 이어졌는가"를
  # 다루는 체인. S4(threshold)는 단순히 WAF 히트 건수만 세지만, S5는 그 공격이
  # 실제로 성공해서 컨테이너 내부까지 침투했는지를 본다. join_on=pod는 workload.yaml의
  # S1과 같은 근거로 성립 - waf/falco 둘 다 orchestrator.resource.name을 신뢰성
  # 있게 채운다(waf는 enrichment.py 정적 매핑, falco는 k8s.pod.name).
  #
  # stage2 event_action의 "Contact K8S API Server From Container"는 대소문자까지
  # falco_rules.yaml 룰 이름과 완전히 똑같아야 한다(workload.yaml S1 주석 참고) -
  # 예전엔 "K8s"(소문자 s)라 Falco가 정상 탐지해도 이 stage2가 영원히 안 걸리는
  # 버그였다(실측 확인 후 수정, 2026-07-14).
  # "Run shell untrusted" 추가(2026-07-18): workload.yaml의 S1과 같은 이유(event-
  # generator 검증 중 발견된 gap) - stage2 후보에 추가해 exec 권한과 무관하게 WAF
  # 침투 직후 어느 조건의 쉘이 뜨든 다 잡는다.
  - id: S5
    name: "WAF CRITICAL 차단 이후 실제 컨테이너 침투 확인"
    type: sequence
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [waf, falco]
    window_seconds: 300
    stage1:
      event_module: waf
      min_severity: 4
    stage2:
      event_module: falco
      event_action: ["Terminal shell in container", "Contact K8S API Server From Container", "Run shell untrusted"]
    severity: 4
    mitre_technique_id: "T1190"

  # S17 (threshold, threshold=1): NodePort Service가 생성되거나 기존 Service가
  # NodePort로 바뀌면 발화 - falcosecurity/plugins의 "Create NodePort Service" 룰과
  # 동일 판정에 더해, ClusterIP로 만든 뒤 patch/update로 NodePort로 바꾸는 경로까지
  # 잡는다(k3d-audit-policy.yaml이 services의 update/patch도 Request 레벨로 남기도록
  # 확장됨, 2026-07-12 - spec.type은 pod의 hostNetwork류와 달리 생성 후에도 바뀔 수
  # 있는 필드라 create만 보면 놓쳤다). 그 룰의 제외 조건 user_known_node_port_service
  # 매크로는 원본에서도 "(k8s_audit_never_true)"로 정의돼 있어 사실상 항상 거짓이다 -
  # 즉 원본 룰 자체가 예외 없이 모든 NodePort 생성을 잡는다(우리가 예외를 뺀 게
  # 아니라 원본이 그렇다). NodePort는 클러스터 밖에서 모든 노드의 고정 포트로 직접
  # 접근 가능한 경로를 새로 만드는 것이라 T1133(External Remote Services, rbac.yaml의
  # S9와 동일 기법) 재사용 - 둘 다 "클러스터 경계 밖에서 접근 가능한 새 경로가
  # 생겼다"는 같은 위협.
  - id: S17
    name: "NodePort Service 노출"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: [create, update, patch]
      orchestrator_resource_type: services
      audit_service_type: NodePort
    severity: 3
    mitre_technique_id: "T1133"

  # S19 (threshold, join_on=source_ip): 동일 IP에서 60초 안에 로그인 실패가 5건
  # 이상이면 발화 - T1110(Brute Force). S4(WAF 다발 차단)와 같은 threshold
  # 패턴이지만 소스가 다르다: S4는 WAF backend가 자체 판정해서 만든 WafAlert를
  # 보고, 이건 nginx-was-logger가 남긴 WAS 원본 access log를 직접 본다 - WAF
  # 프록시를 거치지 않고 Juice Shop에 바로 온 요청도 nginx는 무조건 잡으므로
  # (Target 저장소 juice-shop-with-nginx-sidecar.yaml 참고) WAF 계층과 독립적인
  # 탐지 경로다. 로그인 엔드포인트/실패 판정 기준(POST + 401/403)은 Target
  # 저장소 backend/app/middleware/gateway.py의 LOGIN_PATH_KEYWORDS/
  # LOGIN_FAILURE_STATUS_CODES와 맞춰뒀다(그쪽은 WAF 자체 브루트포스 탐지용으로
  # 별도로 이미 있음 - 이 시나리오와는 독립적인 신호라 중복이 아니라 이중화).
  # Juice Shop 실제 로그인 엔드포인트가 /rest/user/login이라 하드코딩(단일 타깃
  # 전제, 다른 프로젝트와 동일한 한계).
  - id: S19
    name: "동일 IP 로그인 실패 다발 (Brute Force)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [was]
    window_seconds: 60
    threshold: 5
    cooldown_seconds: 300
    match:
      event_module: was
      url_path_prefix: "/rest/user/login"
      http_request_method: POST
      http_response_status_code: [401, 403]
    severity: 3
    mitre_technique_id: "T1110"

  # S24 (threshold, threshold=1, 2026-07-14): TLS 인증서 없이 Ingress가 생성되면
  # 발화 - falcosecurity/plugins의 "Ingress Object without TLS Certificate
  # Created" 룰(ingress_tls 매크로: requestObject.spec.tls 키 존재 여부)을 그대로
  # 옮겼다(WebFetch로 원본 재확인). 원래 이 프로젝트의 감사정책은 ingress를 아예
  # 안 봤다(README "스킵/보류" 항목이었음) - k3d-audit-policy.yaml에
  # networking.k8s.io/ingresses의 create를 Request 레벨로 새로 추가해서 request
  # body(spec.tls)를 받을 수 있게 됐다. NodePort(S17)와 같은 이유로 T1133(External
  # Remote Services) - 평문(HTTP)으로 클러스터 밖에 노출되는 새 경로가 생기는 것도
  # "경계 밖에서 접근 가능한 새 경로"라는 같은 위협군.
  - id: S24
    name: "TLS 없는 Ingress 노출"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: ingresses
      audit_ingress_has_tls: false
    severity: 3
    mitre_technique_id: "T1133"

  # S26 (threshold, threshold=1, 2026-07-15): WAF backend가 이미 자체적으로 판정을
  # 끝낸 브루트포스 이벤트(attack_type=brute_force, Target 저장소
  # backend/app/middleware/gateway.py의 record_login_failure_by_ip/_by_account/
  # record_system_wide_login_failure 3종 - IP 기준/계정 기준(IP 로테이션 대응)/
  # 시스템 전체 스파이크)를 그대로 받아 발화한다. threshold=1인 이유: WAF가 이미
  # 자기 내부 윈도우(brute_force_window_seconds)로 카운팅을 끝내고 "임계치를
  # 넘었다"는 판단까지 마친 뒤에 이 이벤트 하나를 내보내므로, S6/S8/S13처럼 "이
  # 이벤트 자체가 이미 유의미한 단발성 신호"로 다룬다(correlation-engine에서 또
  # 카운팅하면 이중 임계값이 되어 오히려 둔감해짐).
  #
  # S19(WAS 직결 로그인 실패, join_on=source_ip 단순 카운팅)와 겹치지 않는
  # 독립적인 탐지 경로다 - S19는 WAF를 거치지 않는 요청만 보고 IP당 카운팅만
  # 하지만, 이건 WAF를 거친 로그인 시도를 보고 IP 로테이션에도 안 뚫리는 계정
  # 기준 탐지(brute_force_login_account:*)와 시스템 전체 분산 공격 탐지
  # (brute_force_system_wide_spike)까지 포함한다 - 서로 다른 공격 표면을 이중화로
  # 커버.
  #
  # severity=3은 gateway.py의 기본 risk_level(RiskLevel.MEDIUM, _log_brute_force의
  # 기본값)과 맞춘 값 - system-wide-spike만 RiskLevel.CRITICAL로 명시적으로
  # 올라가지만(gateway.py 316번째 줄), 이 엔진은 시나리오당 severity가 고정값이라
  # (rules.py의 _fired_result가 scenario["severity"]를 그대로 씀, 개별 이벤트의
  # event.severity를 안 봄 - S4 등 다른 waf 시나리오도 동일한 한계) 세 변형을
  # 지금은 구분 못 한다 - 나중에 구분하려면 3개로 쪼개거나 min_severity 매처를
  # 추가로 걸어야 함.
  - id: S26
    name: "WAF 계층 로그인 브루트포스 탐지"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: brute_force
    severity: 3
    mitre_technique_id: "T1110"

  # S27 (threshold, threshold=1, 2026-07-15): WAF의 Rate Limiting 탐지
  # (attack_type=rate_limit_abuse, gateway.py의 _is_rate_limited -
  # rate_limit_window_seconds 안에 rate_limit_max_requests 초과)를 그대로 받아
  # DoS 정황으로 발화. README에 "T1499/T1498은 Falco 룰도 없고 pod 상태 변화
  # 수집기도 없어서 보류"로 기록돼 있었는데, 그건 falco 기반 접근 얘기고 이건
  # 완전히 다른 경로(WAF가 이미 만들고 있는 신호)라 그 보류 사유와 무관하게 지금
  # 바로 쓸 수 있다 - 새 수집기 없이 이미 흐르고 있던 신호를 correlation-engine이
  # 그냥 안 쓰고 있었을 뿐. severity=2는 gateway.py의 RiskLevel.LOW
  # (_log_rate_limit_exceeded 고정값)와 맞춘 값.
  - id: S27
    name: "WAF Rate Limit 남용 (DoS 정황)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: rate_limit_abuse
    severity: 2
    mitre_technique_id: "T1499"

  # S28 (threshold, threshold=1, 2026-07-15): WAF의 Bad Bot 탐지
  # (attack_type=bad_bot, gateway.py의 BAD_BOT_USER_AGENTS =
  # ["sqlmap","nikto","nmap","masscan","acunetix","curl/7.0"] User-Agent 서브스트링
  # 매치)를 그대로 받아 정찰(스캐너 툴 사용) 신호로 발화. T1046(Network Service
  # Discovery)은 이 프로젝트 카탈로그(ids_shared.mitre_mapping.CONTAINERS_MATRIX)에
  # 이미 있었지만 지금까지 어떤 시나리오도 안 쓰고 있었음 - 이 시나리오가 첫 사용.
  # severity=2는 gateway.py의 RiskLevel.MEDIUM(_log_bad_bot 고정값 - 실제로는
  # severity.yaml 매핑상 MEDIUM=3이지만 정찰 단계(아직 실공격 아님)라 S10(정찰
  # burst, severity=2)과 급을 맞춰 2로 낮춰 잡음, 실공격 시그니처(sqli/xss 등)가
  # 뒤이어 오면 그건 S4/S5/S26 등이 별도로 더 높은 severity로 잡음.
  #
  # 주의: "curl/7.0"은 공격 툴 시그니처가 아니라 단순 구버전 curl User-Agent
  # 문자열이라 정상 사용자가 우연히 걸릴 오탐 가능성이 있다(WAF 쪽
  # BAD_BOT_USER_AGENTS 목록 자체의 한계) - 이 시나리오를 켠 뒤 오탐이 잦으면
  # PATCH /incidents/{id}/verdict로 false_positive 라벨을 쌓아서(GET /scenarios의
  # precision) 데이터로 확인하고, 필요하면 WAF 쪽 목록에서 curl/7.0을 빼는 걸
  # 제안할 것 - 이 프로젝트의 verdict 피드백 루프(015)가 정확히 이런 판단을 위해
  # 만들어짐.
  - id: S28
    name: "알려진 스캐너 툴 User-Agent 탐지"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: bad_bot
    severity: 2
    mitre_technique_id: "T1046"

  # S51 (threshold, threshold=1, 2026-07-18): S28 보강 - WAF의 User-Agent 로테이션
  # 탐지(attack_type=ua_rotation, gateway.py의 record_user_agent_rotation - 같은
  # IP가 ua_rotation_window_seconds(60초) 안에 서로 다른 User-Agent를
  # ua_rotation_distinct_threshold(4)개 이상 쓰면 발화)를 그대로 받는다.
  #
  # 근거: falcosecurity/event-generator+Atomic Red Team+OWASP ZAP으로 전체
  # 시나리오를 재검증하다가 실측으로 확인(2026-07-17) - S28(BAD_BOT_USER_AGENTS
  # 문자열 매칭)에 "zap"/"burp"를 추가해도, 실제 ZAP의 active scan은 그 UA를 아예
  # 안 쓴다. 원본 요청 로그를 까보니 ZAP이 Chrome/Firefox/iPhone Safari/Yahoo
  # Slurp/msnbot/Edge 등으로 매 요청마다 User-Agent를 로테이션하며 자신을 숨기고
  # 있었다 - 문자열 매칭 방식은 sqlmap/nikto처럼 "정직하게 자기 정체를 밝히는"
  # 구식 CLI 툴만 잡을 수 있는 구조적 한계였다. S51은 UA 값 자체(내용)가 아니라
  # "정상 브라우저라면 세션 내내 고정이어야 할 UA가 짧은 시간에 여러 번 바뀐다"는
  # 행위 패턴을 신호로 삼아 S28의 사각지대를 메운다 - 같은 회피형 스캐너를 다른
  # 각도(내용 기반 vs 행위 기반)로 이중화해서 잡는다는 점에서 S19/S26처럼 서로
  # 독립적인 탐지 경로. MITRE는 T1036(Masquerading, Defense Evasion) - 자신의
  # 정체(도구 정체성)를 계속 바꿔 위장한다는 점에서 정확히 이 기법. severity=2는
  # S28과 같은 급(아직 실공격 시그니처가 아닌 정찰/회피 단계).
  - id: S51
    name: "User-Agent 로테이션 탐지 (핑거프린팅 회피 정황)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: ua_rotation
    severity: 2
    mitre_technique_id: "T1036"

  # S54 (threshold, threshold=1, 2026-07-18): S28/S51 보강 - WAF의 "User-Agent 헤더
  # 자체가 없음" 탐지(attack_type=missing_user_agent, gateway.py의
  # is_missing_user_agent() - /api,/proxy 요청인데 User-Agent 헤더가 빈 문자열이면
  # 발화). S51과 같은 재검증(2026-07-18) 중 발견했지만 다른 각도 - S51은 ZAP의
  # active scan이 매 요청마다 Chrome/Firefox 등으로 UA를 "로테이션"하는 걸 잡는데,
  # OWASP ZAP baseline(passive) 스캔은 그보다 더 단순하게 User-Agent 헤더 자체를
  # 아예 안 보냈다(실측 확인 - nginx-was-logger 원본 로그에 user_agent:"" 그대로
  # 찍힘). S28(문자열 매칭)은 빈 값이 어떤 키워드에도 안 걸려서 못 잡고, S51(UA
  # 로테이션)은 gateway.py의 record_user_agent_rotation()이 애초에 빈 UA를 카운트에서
  # 빼도록 설계돼 있어서(curl류 정상 트래픽 오탐 방지 목적) 이것도 못 잡는다 - 그
  # 설계가 그대로 ZAP baseline의 사각지대가 됐다. 이 구멍을 메우는 세 번째 독립
  # 탐지 경로. MITRE는 S28과 같은 T1046(Network Service Discovery) 재사용 - "정체를
  # 숨기고 스캐닝 툴을 쓴다"는 같은 개념을 다른 신호(UA 부재)로 잡을 뿐이라 별도
  # 기법으로 쪼개지 않는다(T1595 Active Scanning은 이 프로젝트 카탈로그
  # ids_shared.mitre_mapping의 CONTAINERS_MATRIX에 없는 기법이라 쓰면 /attck/coverage
  # 집계에서 빠짐 - S36/S40/S44/S50처럼 falco 태그를 그대로 쓰는 경우와 달리 이건
  # 카탈로그 안에 있는 기법으로 고를 수 있어서 그렇게 했다).
  - id: S54
    name: "User-Agent 누락 요청 탐지 (스캐너 정찰 정황)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: missing_user_agent
    severity: 2
    mitre_technique_id: "T1046"

  # S29 (threshold, threshold=1, 2026-07-15): WAF의 JWT 위조 탐지
  # (attack_type=jwt_forgery, Target 저장소 backend/app/detection/engine.py의
  # _check_jwt_alg_none - Authorization: Bearer 토큰의 header 세그먼트를
  # base64url 디코딩해서 alg=="none"인지 확인, 일반 정규식으로는 못 잡아서 별도
  # 로직으로 분리돼 있음)를 그대로 받아 발화. WAF 자체의 matched_rule_id는
  # "jwt_alg_none" 하나뿐(변형 없음). MITRE 매핑: WAF 쪽 자체 매핑에서도 이
  # 공격을 T1550.001(Application Access Token)로 보는데, 이 프로젝트 카탈로그는
  # sub-technique를 안 담는 컨벤션이라(S20/S21/S25와 동일) 부모 T1550(Use
  # Alternate Authentication Material)으로 기록 - S25(SA 토큰 명시적 발급 정황)와
  # 기법을 공유하지만 서로 다른 계층(SA 토큰 vs JWT)의 별개 사건이다.
  # severity=4는 gateway.py의 RiskLevel.CRITICAL(alg:none은 인증 자체를 완전히
  # 우회하는 고위험 취약점이라 예외적으로 즉시 CRITICAL 고정값)과 맞춘 값.
  - id: S29
    name: "JWT 위조 시도 (alg: none)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: jwt_forgery
    severity: 4
    mitre_technique_id: "T1550"

  # S30 (threshold, join_on=source_ip, 2026-07-15): 동일 IP에서 60초 안에 WAS
  # 응답 404가 10건 이상이면 발화 - 존재하지 않는 경로를 대량으로 두드리는
  # 엔드포인트/디렉터리 무차별 탐색(dirbuster류) 정황. 이건 페이로드 기반
  # 시그니처(SQLi/XSS 등)가 전혀 없는 "정상적인 척하는 요청"이라 WAF 시그니처
  # 엔진(signatures.py)이 절대 못 잡는 사각지대다 - was 원본 access log의
  # http_response_status_code만으로 판정하므로 WAF를 거치지 않고 바로 오는
  # 요청(S19와 같은 이유)도 잡는다. threshold=10은 초기 추정치(정상 사용자가
  # 60초 안에 서로 다른 404를 10번 이상 만나는 건 드물다는 가정) - 근거로 삼을
  # 실측 트래픽 기준선이 아직 없어서, 오탐/미탐 여부는 PATCH
  # /incidents/{id}/verdict로 라벨을 쌓아 GET /scenarios의 precision을 보고
  # 나중에 조정할 것(015 피드백 루프가 바로 이 목적). MITRE 매핑은 S28과 같은
  # T1046(Network Service Discovery, 이미 카탈로그에 있음)로 잡았다 - 페이로드
  # 대신 응답 패턴으로 하는 정찰이라는 점에서 동일 기법으로 분류.
  - id: S30
    name: "동일 IP WAS 404 다발 (엔드포인트 무차별 탐색)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [was]
    window_seconds: 60
    threshold: 10
    cooldown_seconds: 300
    match:
      event_module: was
      http_response_status_code: 404
    severity: 2
    mitre_technique_id: "T1046"

  # S33 (threshold, threshold=1, 2026-07-17): WAF의 CORS 위반 탐지(attack_type=
  # cors_abuse, gateway.py의 check_cors_violation - Origin 헤더가 있는데
  # settings.allowed_origins 화이트리스트에 없으면 로그, Origin이 아예 없는
  # 요청은 브라우저 fetch가 아닐 가능성이 높아 통과시킴)를 그대로 받아 발화.
  # S26~S29(WAF가 이미 판정을 끝낸 신호를 threshold=1로 즉시 받는 패턴)와 동일 -
  # gateway.py 자체가 4대 핵심 탐지(Bad Bot/CORS/RateLimit/BruteForce) 중 하나로
  # 문서화해뒀는데도 지금까지 대응하는 시나리오가 없었다(실측 확인, 2026-07-17 -
  # falcosecurity/event-generator+Atomic Red Team+OWASP ZAP으로 전체 시나리오
  # 검증하던 중 /logs?module=waf에 cors_abuse 이벤트가 실제로 쌓이고 있는데 매치되는
  # 시나리오가 없다는 걸 발견). 다른 사이트(evil.com 등)가 피해자 브라우저를 통해
  # 우리 API에 인증된 요청을 몰래 보내려는 시도라 "웹 앱의 접근 제어 경계를
  # 노린다"는 점에서 S4/S5와 같은 T1190(Exploit Public-Facing Application) 재사용.
  # severity=3은 gateway.py의 risk_level(RiskLevel.MEDIUM, _log_cors_violation
  # 고정값)과 맞춘 값 - S26과 동일 논리.
  - id: S33
    name: "CORS 위반 탐지 (신뢰되지 않은 Origin)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: cors_abuse
    severity: 3
    mitre_technique_id: "T1190"

  # S55 (threshold, threshold=1, 2026-07-18): WAF가 signatures.py로 이미 CRITICAL
  # 판정을 끝낸 단발성 페이로드 공격(SQLi/XSS/OS Command Injection/Path Traversal)이
  # 지금까지 이 카탈로그에서 완전히 빠져 있던 사각지대를 메운다.
  #
  # 실측 확인(2026-07-18): Target 저장소(Techeer-12th-b) backend/app/detection/
  # signatures.py에 정의된 24개 AttackType 중 실제로 정규식이 구현된 건 sqli/xss/
  # os_command_injection/path_traversal 4종뿐이고(나머지는 스키마의 enum/MITRE 매핑만
  # 있고 engine.py의 SIGNATURES 리스트에는 대응 규칙이 없는 미구현 상태), 이 4종이
  # CRITICAL로 판정되면(severity=4) WafAlert가 그대로 남는다 - WAF 대시보드/로그에는
  # 분명히 "CRITICAL"로 찍히는데도, 지금까지 correlation-engine이 이 이벤트로 인시던트를
  # 만드는 경로가 하나도 없었다:
  #   - S4(threshold=5, 같은 IP에서 60초 안에 5건 이상)는 "다발성"이 전제라 단발
  #     공격 1건은 threshold를 못 채운다.
  #   - S5(sequence)는 같은 pod에서 falco 쉘/API 접근까지 이어져야(300초 안) 발화한다
  #     - 공격이 실제 컨테이너 침투로 이어지지 않으면(예: 애초에 취약점이 없어서 막힘,
  #     또는 아직 침투가 진행 중) stage2가 영원히 안 온다.
  # 즉 "WAF는 확실히 막고 CRITICAL로 기록했는데, 상관분석 엔진은 아무 인시던트도
  # 안 만드는" 조용한 사각지대가 있었다 - S26~S29/S33/S51/S54와 같은 문제의식
  # (README "WAF가 이미 판정을 끝낸 신호를 correlation-engine이 안 쓰고 있었다")를
  # signatures.py 기반 4종 공격에도 적용한 것.
  #
  # threshold=1인 이유는 S26/S28/S29/S33과 동일 - WAF 시그니처 엔진이 이미 정규식
  # 매칭 + risk_level=CRITICAL 판정까지 마친 신호라 "이 이벤트 자체가 이미 유의미한
  # 단발성 신호"다. min_severity: 4로 CRITICAL 등급만 받는 이유는 S4/S5의 CRITICAL
  # 기준(severity.yaml risk_level.CRITICAL -> 4)과 맞추기 위함 - MEDIUM 등급 하위
  # 시그니처(예: sqli_comment_terminator의 `--`/`#`/`/*`처럼 오탐 가능성이 더 큰 패턴)는
  # 이 시나리오의 대상이 아니다(S4/S5 burst/chain 경로로만 잡힘, 굳이 여기서 같이
  # 올리면 오탐 소음만 늘어남). event_action을 [sqli, xss, os_command_injection,
  # path_traversal] 4개로 명시한 이유는 min_severity=4만으로는 jwt_forgery(이미
  # S29 전담)까지 같이 걸려 중복 발화하기 때문 - signatures.py 기반 시그니처만
  # 정확히 골라낸다. mitre_technique_id는 S4/S5와 동일한 T1190(Exploit
  # Public-Facing Application) - 4종 모두 "공개 웹 앱의 취약점을 직접 악용"이라는
  # 점에서 같은 기법(Techeer-12th-b의 detection/mitre_mapping.py도 sqli/os_command_
  # injection을 T1190/T1059로 각각 매핑하지만, 이 카탈로그는 시나리오당 기법 하나만
  # 기록하는 기존 컨벤션이라 S4/S5와 통일).
  - id: S55
    name: "WAF 시그니처 단발 CRITICAL 공격 탐지 (다발/침투로 안 이어져도 즉시 발화)"
    type: threshold
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 300
    match:
      event_module: waf
      event_action: [sqli, xss, os_command_injection, path_traversal]
      min_severity: 4
    severity: 3
    mitre_technique_id: "T1190"

  # S59 (sequence, 5단계, 2026-07-19): WAF/WAS/Falco/k8s_audit 4개 로그 소스를 전부
  # 하나의 체인으로 잇는 첫 시나리오 - "여러 계층 로그를 종합 분석한다"고 하기엔
  # 이 카탈로그가 사실상 S1/S5(그마저 2단계뿐) 말고는 전부 단일 소스 threshold라는
  # 걸 대화 중 실측 점검하며 확인한 뒤, N단계 sequence 엔진 일반화(rules.py의
  # _stage_patterns())와 actor_identity 브릿지(schemas.py/enrichment.py) 두 가지를
  # 먼저 만들고 나서야 쓸 수 있었던 시나리오.
  #
  # 단계별 근거 - 뭐가 진짜 인과관계고 뭐가 시뮬레이션인지 S5와 같은 정직성 원칙으로
  # 명시한다(가짜를 진짜인 척 안 함):
  #   stage1(waf, min_severity=4): 공개 웹앱(Juice Shop)에 대한 CRITICAL 등급 공격
  #     (SQLi/XSS/커맨드 인젝션 등, S4/S5와 동일 재료) - 실제 침입 성공 여부와
  #     무관하게 WAF가 확정 판정한 신호.
  #   stage2(falco, "Terminal shell in container"/"Contact K8S API Server From
  #     Container"/"Run shell untrusted"): 그 침입이 실제로 컨테이너 안 발판
  #     확보로 이어졌다는 확인 - S1/S5의 stage2 재사용. ⚠️ S5와 같은 한계: Juice
  #     Shop 자체엔 실제 RCE가 없어(OWASP Top10 로직 취약점 위주 교육용 앱) stage1이
  #     진짜로 stage2를 유발하지 않는다 - 이 두 단계의 연결은 여전히 재현
  #     스크립트(scenarios.py)가 같은 시간대에 각각 만들어주는 시뮬레이션이다.
  #   stage3(falco, "ServiceAccount Token File Read", S56 재료): stage2부터는
  #     진짜 인과관계다 - 컨테이너 안에 발판을 확보한 공격자가 다음으로 할 만한
  #     가장 자연스러운 행동이 자기 pod에 마운트된 SA 토큰을 훔치는 것(T1552,
  #     stratus-red-team의 k8s.credential-access.steal-serviceaccount-token과
  #     동일 기법 - 이 프로젝트가 실측으로 검증한 실제 공격 패턴).
  #   stage4(k8s_audit, "create serviceaccounts/token", S25 재료): 훔친 신원으로
  #     실제로 K8s API를 호출해 장기 토큰을 발급받는 정황 - 이 이벤트의
  #     kubernetes.audit.user.name은 kube-apiserver가 실제로 인증한 신원 그대로라
  #     (조작 아님) enrichment.py가 stage1~3에 채워 넣은 actor_identity와 여기서
  #     자연스럽게 일치한다.
  #   stage5(k8s_audit, (cluster)rolebinding 생성 시도, S13류): 그 신원으로 클러스터
  #     권한 확보를 시도 - 외부 웹 공격 하나가 결국 권한상승 시도까지 이어졌다는 이
  #     시나리오의 결론. ⚠️ 실측으로 발견한 한계(2026-07-19): S13처럼
  #     audit_binding_role_name(requestObject.roleRef.name 파싱)으로 "cluster-admin
  #     롤인지"까지 정교하게 보고 싶었으나, RBAC이 요청 자체를 403으로 거부하면
  #     kube-apiserver 감사로그에 requestObject 필드 자체가 안 남는다(k3d-audit-
  #     policy.yaml이 RequestResponse 레벨을 요청해도 마찬가지 - 인가 단계에서
  #     막히면 본문 파싱 단계까지 못 감, 실제 클러스터로 재현해서 확인함). 이
  #     시나리오가 재현하는 SA(기본 권한 없음)는 이 시도가 항상 403으로 막히므로,
  #     stage5는 audit_binding_role_name 없이 "(cluster)rolebinding을 만들려는
  #     시도 자체"만 본다 - 오히려 실패한 권한상승 시도까지 놓치지 않는다는 점에서
  #     더 넓은 신호(S9의 "성공 여부와 무관하게 시도 자체를 본다"는 원칙과 동일선상).
  #
  # join_on=user_or_sa: rules.py의 _join_key()가 actor_identity(있으면 우선) ->
  # user_name 순으로 본다. stage1~3(waf/falco)은 enrichment.py가 대상 pod(juice-shop/
  # juice-shop-2)에 정적으로 매핑해둔 actor_identity로 join되고, stage4~5(k8s_audit)는
  # 실제 인증된 user_name으로 join된다 - 둘 다 같은 문자열
  # (system:serviceaccount:default:default)을 가리키므로 자연히 이어진다(위 stage4
  # 설명 참고). window_seconds=300은 S3/S7(RBAC 관련 2단계 시퀀스)과 동일 예산 -
  # 5단계라 넉넉히 잡되 무한정 열어두지 않는다. mitre_technique_id는 S4/S5와 같은
  # T1190 - 이 체인 전체의 시작점(공개 웹앱 익스플로잇)을 기준으로 분류한다.
  - id: S59
    name: "공개 웹앱 공격이 SA 토큰 탈취를 거쳐 클러스터 관리자 권한 탈취로 이어지는 정황"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [waf, falco, k8s_audit]
    window_seconds: 300
    stage1:
      event_module: waf
      min_severity: 4
    stage2:
      event_module: falco
      event_action: ["Terminal shell in container", "Contact K8S API Server From Container", "Run shell untrusted"]
    stage3:
      event_module: falco
      event_action: "ServiceAccount Token File Read"
    stage4:
      event_module: k8s_audit
      event_action: "create serviceaccounts/token"
    stage5:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: [rolebindings, clusterrolebindings]
    severity: 4
    mitre_technique_id: "T1190"

  # S60 (sequence, 2026-07-19, Notion "여러 계층 시나리오" M1 구현): WAF가 SQLi/XSS/
  # OS Command Injection/Path Traversal 페이로드를 매칭한 뒤(차단이든 모니터링이든
  # 무관 - min_severity 제한 없음), 같은 IP에서 WAS가 실제로 5xx 오류를 낸다면 -
  # WAF가 패턴만 잡은 게 아니라 애플리케이션이 그 페이로드에 실제로 반응했다는 뜻이라
  # 단독 탐지보다 신뢰도가 훨씬 높은 인시던트가 된다.
  #
  # `S55`(같은 event_action 집합, min_severity=4 CRITICAL만 즉시 단발 발화)와
  # 대체 관계가 아니라 `S4`/`S5`처럼 나란히 두는 보완 관계다 - S55는 심각도 높은
  # 단발 공격 자체를 즉시 잡고, 이건 심각도와 무관하게 "실제로 먹혔는지"까지
  # 확인한다(S55가 이미 잡은 CRITICAL 건도 여기서 다시 확인되면 별개 인시던트로
  # 함께 발화할 수 있음 - 두 관점이 서로 다른 질문에 답하므로 의도된 중복이다).
  #
  # join_on=source_ip: waf/was 둘 다 이미 이 축으로 독립 시나리오를 운영 중이라
  # (S4/S19/S26 등) `S1`/`S5`가 pod 매핑에서 겪었던 "서로 다른 신원 체계" 문제 자체가
  # 없다 - 둘 다 같은 HTTP 트래픽을 관측하는 계층이라 source_ip가 그대로 신뢰성
  # 있게 이어진다.
  #
  # http_response_status_code=[500,502,503]: "DB 에러 스택트레이스 노출" 같은
  # 응답 바디 내용 자체를 보는 필드는 NormalizedEvent에 없어(스키마 확인) 상태
  # 코드로 근사한다 - 5xx는 서버가 그 요청 처리 중 실제로 실패했다는 가장 직접적인
  # 신호다. severity=4는 S5(같은 "탐지 vs 실제 침투 확인" 발상)와 같은 급 -
  # 확정적 침해 확인이라 최고 등급으로 잡는다.
  - id: S60
    name: "WAF 공격 패턴 매칭 이후 WAS 실제 오류 응답 확인 (탐지 vs 실제 침투)"
    type: sequence
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf, was]
    window_seconds: 60
    stage1:
      event_module: waf
      event_action: [sqli, xss, os_command_injection, path_traversal]
    stage2:
      event_module: was
      http_response_status_code: [500, 502, 503]
    severity: 4
    mitre_technique_id: "T1190"

  # S63 (sequence, join_on=source_ip, 2026-07-19, Notion "여러 계층 시나리오" M20
  # 구현): `S60`(M1)과 같은 발상("탐지됐다"가 아니라 "실제로 먹혔다"까지 확인)을
  # CORS 특화 벡터에 적용한 것 - S33(CORS 위반, 신뢰 안 된 오리진의 요청 시도)은
  # "시도가 있었다"만 본다. 그 요청이 실제로 인증이 필요한 API에서 성공 응답을
  # 받았는지까지 확인해야 "브라우저에 저장된 세션 쿠키가 실제로 도용돼 크로스
  # 사이트 요청이 먹혔다"는 확정적 증거가 된다 - S60이 SQLi/CMDi류 페이로드
  # 공격에 초점이라면 이건 CSRF성 세션 도용에 초점이라는 점이 다르다.
  #
  # ⚠️ stage2 설계는 두 가지를 원안에서 축소했다(사용자 확인 후 결정, 2026-07-19):
  #   - "인증이 필요한 엔드포인트"를 규칙엔진(_MATCHERS)의 url_path_prefix로
  #     표현했는데, 이 필드는 문자열 하나만 받고 regex도 지원하지 않는다 -
  #     "Juice Shop 핵심 인증 경로를 정규식으로 전부 커버"하려면 rules.py에 새
  #     매처를 추가하는 실제 코드 변경이 필요해서(이 카탈로그 확장 전체에 걸친
  #     "코드 변경 없이 가능하면" 기준을 벗어남), 대표 엔드포인트 하나
  #     (`/rest/user/whoami` - 로그인된 세션이어야만 의미 있는 응답을 주는
  #     엔드포인트라 인증 확인 용도로 가장 직관적)로 좁혔다. 다른 인증 경로
  #     (`/rest/basket` 등)까지 넓히려면 rules.py의 url_path_prefix 매처를 리스트
  #     지원 또는 regex 매처로 확장해야 한다.
  #   - "정상(200~299) 응답"은 http_response_status_code에 범위 비교 매처가 없어
  #     (S60/M10 검토 때 이미 확인된 한계 - min_severity 하나만 event_severity
  #     전용 하드코딩) 실제로 나올 법한 2xx 코드를 나열하는 방식(S60의 5xx 리스트와
  #     같은 근사)으로 대신했다.
  #
  # mitre_technique_id=T1190: 이 시나리오의 stage1 재료인 S33과 같은 태그를
  # 물려받는다 - S60/S61/S62가 이미 확립한 "재사용한 원조 시나리오의 기법 태그를
  # 따른다"는 컨벤션.
  - id: S63
    name: "CORS 남용 이후 인증된 세션의 이상 API 호출 확인 (WAF → WAS)"
    type: sequence
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf, was]
    window_seconds: 60
    stage1:
      event_module: waf
      event_action: cors_abuse
    stage2:
      event_module: was
      url_path_prefix: "/rest/user/whoami"
      http_response_status_code: [200, 201, 204]
    severity: 4
    mitre_technique_id: "T1190"

  # S65 (sequence, join_on=source_ip, 2026-07-19, Notion "여러 계층 시나리오" M33
  # 구현): M1(S60)/M20(S63)에 이은 "탐지됨 vs 먹힘" 계열의 세 번째 변형 - JWT
  # 위조 벡터 특화. `S29`(jwt_forgery, alg:none 위조 시도)는 위조 시도 자체만
  # 본다 - 그 위조된 토큰으로 실제로 인증이 필요한 리소스에 접근이 성공했는지까지
  # 확인해야 "인증 우회가 실제로 먹혔다"는 확정적 증거가 된다.
  #
  # stage2는 S63과 완전히 동일한 설계를 그대로 재사용한다(같은 세션/이유로
  # 정한 값 - S63 검토 시 사용자가 직접 확인한 엔드포인트) - "인증이 필요한
  # 엔드포인트"를 `/rest/user/whoami`(url_path_prefix, regex/다중경로 매처는
  # rules.py 확장이 필요해 이번에도 단일 대표 엔드포인트로 축소)로, "정상 응답"을
  # 실제로 나올 법한 2xx 코드 리스트([200, 201, 204], 범위 비교 매처가 없어
  # S60/S63과 같은 근사)로 표현했다.
  #
  # mitre_technique_id=T1550: stage1 재료인 S29의 태그를 그대로 물려받는다 -
  # S60~S64가 이미 확립한 "재사용한 원조 시나리오의 기법 태그를 따른다"는 컨벤션.
  # severity=4는 S60/S63과 같은 논리 - 확정적 침해 확인이라 최고 등급으로 잡는다.
  - id: S65
    name: "위조 JWT의 실제 인증 우회 성공 확인 (WAF → WAS)"
    type: sequence
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf, was]
    window_seconds: 60
    stage1:
      event_module: waf
      event_action: jwt_forgery
    stage2:
      event_module: was
      url_path_prefix: "/rest/user/whoami"
      http_response_status_code: [200, 201, 204]
    severity: 4
    mitre_technique_id: "T1550"

  # S71 (threshold, threshold=1, 2026-07-20, Notion "여러 계층 시나리오" M60 구현):
  # NetworkPolicy는 파드 간 네트워크 세그멘테이션(예: DB pod는 API pod에서만 접근
  # 가능)을 강제하는 유일한 수단이다 - 이걸 지우면 이미 뚫린 pod 하나에서 클러스터
  # 내부의 다른 워크로드로 옆으로 이동하기가 훨씬 쉬워진다. `S11`(system: 롤 변조,
  # T1685)/M27(Falco 무력화, 보류됨)과 같은 "방어 체계 자체를 노리는" 계열이지만,
  # 이건 네트워크 세그멘테이션이라는 또 다른 방어층을 겨냥한다는 점에서 별개.
  #
  # k3d-audit-policy.yaml에 networkpolicies 전용 규칙은 없지만, 맨 아래 catch-all
  # (level: Metadata, verbs: [create/update/patch/delete/deletecollection] - "그 외
  # 클러스터 상태를 바꾸는 모든 요청은 최소 Metadata 레벨로 기록")이 이미 모든
  # 리소스의 delete를 잡고 있어 audit_verb/orchestrator_resource_type만 보면
  # 충분한 이 시나리오엔 정책 변경 없이 바로 쓸 수 있다(request body가 필요한
  # S12~S18류와 다름).
  #
  # join_on=user_or_sa, severity=4는 S8/S11(단발성 방어 무력화/파괴 행위) 컨벤션
  # 그대로. mitre_technique_id=T1562(Impair Defenses)는 CONTAINERS_MATRIX에 없는
  # 기법이지만 MITRE 공식 Containers 매트릭스가 명시하는 개념을 직접 인용 - S28/
  # S36/S40/S44/S50/S70이 이미 쓰는 "카탈로그 밖 기법 사용" 관례와 동일.
  - id: S71
    name: "NetworkPolicy 삭제를 통한 방어 설정 무력화"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      audit_verb: delete
      orchestrator_resource_type: networkpolicies
    severity: 4
    mitre_technique_id: "T1562"

  # S77 (threshold, threshold=1, 2026-07-20, Notion "여러 계층 시나리오" M80 구현,
  # DET0445 기반, README "스킵" 항목 재검토): README.md는 port-forward를 "MITRE
  # 기법이 깔끔하게 안 맞아 억지로 끼워맞추지 않기로 하고 스킵"한 항목으로 기록하고
  # 있었다 - 그런데 MITRE 공식 DET0445(T1090 Proxy)의 AN1233은 정확히 "동적/정적
  # 포트 포워딩 규칙 추가"를 프록시 인프라 구축의 신호로 명시한다. 이 문서 전체에서
  # 유일하게 기존 "스킵" 결정을 공식 문서 재조회로 뒤집는 사례.
  #
  # falcosecurity/plugins의 k8s_audit_rules.yaml "port-forward" 룰을 WebFetch로
  # 직접 재확인 - 조건은 `ka.target.subresource in (portforward)`(verb 제한 없음).
  # 정확한 verb를 알 수 없어 S1이 pods/exec·attach에서 이미 겪은 것과 같은 이중
  # verb 패턴(create/get)으로 안전하게 잡는다 - k3d-audit-policy.yaml에 전용 규칙은
  # 없지만 mutating catch-all 또는 마지막 "나머지 API 호출도 기본 수집" catch-all
  # 둘 중 하나로 이미 잡히고 있어 정책 변경 없이 바로 쓸 수 있다.
  #
  # join_on=user_or_sa는 S6/S8/S9/S11 등 단발성 K8s Audit 시나리오의 기존
  # 컨벤션 그대로. severity=3은 falcosecurity 원본 태그가 심각도 신호 없이
  # [k8s]뿐이라, 새 외부 접근 경로를 만드는 S17/S24(둘 다 3)와 같은 급으로 잡았다.
  - id: S77
    name: "kubectl port-forward를 이용한 프록시 터널 구축 탐지"
    type: threshold
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 60
    threshold: 1
    cooldown_seconds: 600
    match:
      event_module: k8s_audit
      event_action: ["create pods/portforward", "get pods/portforward"]
    severity: 3
    mitre_technique_id: "T1090"

  # S78 (sequence, join_on=source_ip, 2026-07-20, Notion "여러 계층 시나리오" M81
  # 구현, DET0304/DET0415 기반, M39 대안 경로): M39(WAF Rate Limit 남용 이후 리소스
  # 고갈 확인)는 pod 상태(crashloop 등) 텔레메트리가 이 파이프라인에 없어 막혔다고
  # 결론 냈다 - 그런데 MITRE 공식 DET0304(AN0851/AN0852)와 DET0415(AN1168)를
  # 보면 신호는 "크래시 자체"가 아니라 "그 이후 관측되는 반복적인 5xx/서비스
  # 실패"다. WAS는 이미 응답 상태코드를 보고 있으므로, pod 상태 데이터 없이도 이
  # 신호를 근사할 수 있는 대안 경로가 된다.
  #
  # ⚠️ 원안의 stage1("페이로드 매칭 다발")/stage2("5xx 급증")은 둘 다 "여러 건"을
  # 요구하는데, sequence의 stage는 이벤트 한 건의 패턴만 볼 수 있어(M19/M34에서
  # 이미 확인한 엔진 제약) 그대로 못 옮긴다. 그래서 단발 이벤트로 완화했다 - 이
  # 결과 stage1/stage2의 원재료 자체는 `S60`(M1)과 겹친다(같은 WAF 익스플로잇
  # event_action 리스트 + WAS 5xx). 다만 M81은 M1과 다른 질문에 답한다 - M1은
  # "탐지된 공격이 실제로 침투에 성공했는가"(T1190)를 보고, 이건 "반복적
  # 익스플로잇/퍼징 시도가 서비스 자체를 불안정하게 만들었는가"(T1499, DoS)를
  # 본다 - 그래서 stage2 상태코드에 순수 애플리케이션 에러(500)뿐 아니라 과부하/
  # 타임아웃을 직접 가리키는 503/504도 포함시켜 서비스 불안정 쪽에 더 가깝게
  # 잡았다. `S27`(단순 요청 폭주, 페이로드 무관)과 달리 "페이로드 자체가
  # 익스플로잇/퍼징 시도"라는 조건이 붙는다는 점에서 별개.
  #
  # severity=3은 S60(확정적 침투 확인, 4)보다 한 단계 낮다 - 이건 "먹혔다"는
  # 확정 증거가 아니라 "불안정해졌다"는 간접 증거라 신뢰도가 상대적으로 낮다.
  - id: S78
    name: "익스플로잇/퍼징 트래픽 이후 서비스 불안정 확인 (WAF → WAS)"
    type: sequence
    join_on: source_ip
    correlation_key_type: "source.ip"
    required_modules: [waf, was]
    window_seconds: 60
    stage1:
      event_module: waf
      event_action: [sqli, xss, os_command_injection, path_traversal]
    stage2:
      event_module: was
      http_response_status_code: [500, 502, 503, 504]
    severity: 3
    mitre_technique_id: "T1499"

  # S83 (sequence, join_on=user_or_sa, 3단계, 2026-07-20, Notion "여러 계층
  # 시나리오" M5 구현): 브루트포스 → 계정 탈취 → 관리 API 오남용을 하나의
  # 킬체인으로 엮는다. `S19`/`S26`은 브루트포스 "시도" 자체까지만 잡고 끝난다 -
  # 탈취 성공 이후 실제 관리 API 오남용까지 이어졌는지 잇는 후속 체인은 없었다.
  #
  # stage1은 `S19`가 아니라 `S26`의 재료를 쓴다 - S19는 threshold(60초 안에
  # 5회) 타입이라 sequence stage 조건으로 그대로 못 옮기지만(M19/M34/M81에서
  # 이미 확인한 엔진 제약), S26은 WAF 자체가 이미 내부에서 카운팅과 임계치 판단을
  # 끝내고 단발 이벤트(event_action=brute_force)로 내보내므로 sequence stage1로
  # 바로 쓸 수 있다.
  #
  # stage2는 `S19`와 같은 로그인 엔드포인트(/rest/user/login, POST)를 보되
  # 실패(401/403) 대신 성공(200)을 본다 - "탈취가 실제로 성공했다"는 확인.
  #
  # stage3의 join_on=user_or_sa는 `S59`/`S82`가 이미 증명한 actor_identity
  # 브릿지(enrichment.py가 대상 pod에 정적으로 매핑해둔 K8s 신원)를 그대로
  # 쓴다 - "탈취된 세션과 연동된 서비스어카운트가 실제로 관리 API를 오남용했다"는
  # 전제는 S59가 이미 검증한 것과 같은 종류의 해석이다. ConfigMap/Secret 수정,
  # 스케일링(Deployment/StatefulSet), RBAC 변경(S3/S62 재료)을 event_action
  # 리스트 하나로 합쳤다.
  #
  # mitre_technique_id=T1110: stage1 재료인 S26의 태그를 그대로 물려받는다 -
  # "브루트포스"가 이 시나리오의 헤드라인(M5 원문 제목의 시작점)이고 stage2/3은
  # 그게 실제 성공과 오남용으로 이어졌다는 확인 단계. severity=4는 S59와 같은
  # 급 - 확정적 전체 침해 체인.
  - id: S83
    name: "브루트포스 → 계정 탈취 → 관리 API 오남용 (WAF → WAS → K8s Audit)"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [waf, was, k8s_audit]
    window_seconds: 300
    stage1:
      event_module: waf
      event_action: brute_force
    stage2:
      event_module: was
      url_path_prefix: "/rest/user/login"
      http_request_method: POST
      http_response_status_code: 200
    stage3:
      event_module: k8s_audit
      event_action:
        [
          "create configmaps",
          "update configmaps",
          "patch configmaps",
          "create secrets",
          "update secrets",
          "patch secrets",
          "update deployments",
          "patch deployments",
          "update statefulsets",
          "patch statefulsets",
          "create clusterroles",
          "delete clusterroles",
          "deletecollection clusterroles",
          "patch clusterroles",
          "update clusterroles",
          "create clusterrolebindings",
          "delete clusterrolebindings",
          "deletecollection clusterrolebindings",
          "patch clusterrolebindings",
          "update clusterrolebindings",
          "create roles",
          "delete roles",
          "deletecollection roles",
          "patch roles",
          "update roles",
          "create rolebindings",
          "delete rolebindings",
          "deletecollection rolebindings",
          "patch rolebindings",
          "update rolebindings",
        ]
    severity: 4
    mitre_technique_id: "T1110"

  # S84 (sequence, join_on=pod, 3단계, 2026-07-20, Notion "여러 계층 시나리오" M76
  # 구현, DET0080 기반, M1/M2 통합판 — 단 stage4는 제외): MITRE 공식 DET0080의
  # AN0220(Apache/Nginx)·AN0222(컨테이너)는 "탐지 → 에러율 증가 → 웹서버 프로세스의
  # 쉘 생성/웹쉘 → 외부 콜백"이라는 4단계 전체를 하나의 분석으로 규정한다 -
  # `S60`(M1)은 앞 2단계만 봤는데, 이 시나리오는 stage3(웹서버 프로세스의 예상 밖
  # 자식 프로세스, M2 재료)까지 이어붙여 사실상 M1과 M2를 하나로 통합한다.
  #
  # ⚠️ stage4(외부 목적지 연결/메타데이터 IP 접근, M8/M16 재료)는 여전히 막혀
  # 있다 - NormalizedEvent에 목적지 IP/포트 필드 자체가 없고(schemas.py 확인),
  # falcosecurity/rules core에도 클라우드 메타데이터 IP나 일반적인 "의심 목적지"를
  # 잡는 룰이 없음을 WebFetch로 재확인(M54 조사 때 확인한 "Contact K8S API Server
  # From Container"는 K8s API 서버 접속만 잡고 임의 외부 목적지는 안 봄, 이미
  # S1/S5/S59/S81의 stage2 재료로 다른 목적으로 쓰이고 있음). 그래서 이건 DET0080
  # 4단계 완전판이 아니라 3단계 축소판이다.
  #
  # stage3 "Web Server Spawned Suspicious Child Process"는 falcosecurity/rules
  # core에 실제로 존재함을 WebFetch로 확인(M54 조사 때 발견 - condition:
  # spawned_process and spawned_by_web_server and proc.name in
  # (suspicious_web_children), 태그 mitre_execution/T1059) - 이 카탈로그에서
  # 처음 쓰인다.
  #
  # join_on=pod: enrichment.py를 직접 확인한 결과 WAF/WAS는 각각 Juice Shop 응답
  # 헤더(X-Served-By-Pod)/nginx-was-logger의 Downward API로 orchestrator.*를
  # "실제 서빙 pod 이름"으로 동적으로 채운다(정적 매핑이 아님, normalizer.py의
  # normalize_was/normalize_waf) - S5가 이미 증명한 WAF→Falco pod 조인이 WAS까지
  # 포함해 3단계 전체에 정확하게 적용된다.
  #
  # mitre_technique_id=T1190: stage1 재료인 S60/S26 계열과 같은 헤드라인("웹
  # 익스플로잇")을 물려받는다. severity=4는 S60과 같은 급 - 확정적 침해 확인
  # 체인이 한 단계 더 길어진 것.
  - id: S84
    name: "웹 익스플로잇 → 에러율 증가 → 웹서버 프로세스 이상 자식 프로세스 확인 (WAF/WAS → WAS → Falco)"
    type: sequence
    join_on: pod
    correlation_key_type: "orchestrator.resource.name"
    required_modules: [waf, was, falco]
    window_seconds: 300
    stage1:
      event_module: waf
      event_action: [sqli, xss, os_command_injection, path_traversal]
    stage2:
      event_module: was
      http_response_status_code: [500, 502, 503]
    stage3:
      event_module: falco
      event_action: "Web Server Spawned Suspicious Child Process"
    severity: 4
    mitre_technique_id: "T1190"

  # S85 (sequence, join_on=user_or_sa, 4단계, 2026-07-20, Notion "여러 계층
  # 시나리오" M7 구현): `S3`(RBAC 상승 → exec)는 이미 있지만 시작점이 k8s_audit이라
  # "웹 계층에서의 최초 인증 우회"는 못 본다 - 이 시나리오는 WAF/WAS를 stage1~2로
  # 앞에 붙여 최초 침투 경로까지 추적한다.
  #
  # stage1/2는 WAF가 아니라 WAS를 직접 본다 - Target 저장소(Techeer-12th-b) 백엔드에
  # "관리자 경로 비인가 접근"을 판정하는 WAF attack_type이 없음을 확인했다(admin/
  # actuator 관련 로직 전무) - S19가 이미 WAF를 거치지 않고 WAS 원본 로그를 직접
  # 보는 것과 같은 방식으로 대체했다. 관리자 경로는 사용자 확인 후
  # `/rest/admin/application-configuration`(Juice Shop의 실제 관리자 설정 조회
  # API)로 정했다 - stage1(401/403, 차단/거부됨)과 stage2(200, 우회 성공) 쌍으로
  # "탐지 vs 먹힘"을 본다(M1/M20/M33과 같은 발상).
  #
  # stage3(`S3`의 RBAC 오브젝트 변경 verb 범위 재사용)/stage4(`S16`의 위험한 pod
  # 생성 조건 재사용)로 이어진다.
  #
  # ⚠️ 원안의 stage4는 "신규 Pod 생성 후 비정상 프로세스 실행"(S1/S16 재료)까지
  # 요구하지만, "프로세스 실행 확인"(falco, join_on=pod)까지 추가하면 5단계가
  # 되고 그 전환에 pod 축이 필요한데, 이 시퀀스는 stage1~4 전체가 user_or_sa
  # 하나로 통일돼야 한다(엔진은 시나리오 전체에 단일 join_on만 지원, 모듈
  # docstring 참고) - stage4는 S16의 "위험한 설정을 가진 pod 생성"까지만 본다.
  #
  # 2026-07-20 추가: 그 pod 안에서 실제로 이상행동이 확인됐는지(S1 후반부)는
  # 5번째 stage로 억지로 우겨넣는 대신, workload.yaml의 `S94`가
  # requires_recent_fire 메커니즘(rules.py 모듈 docstring, discovery.yaml
  # S92→S93이 최초 사용 사례)으로 이어받는다 - 그래서 이 시나리오가
  # stamps_fired_marker: true + fired_marker_join_on: pod를 켠다. sequence가
  # 마지막 단계(stage4)까지 완주해 발화하는 순간, 그 stage4 이벤트("create
  # pods" 감사 로그 - orchestrator_resource_name에 새로 생성된 pod 이름을
  # 신뢰성 있게 담는다, S67/S68 주석이 이미 확인한 원칙) 자체를 pod 축으로 마킹한다
  # - 이 시나리오 자신의 join_on(user_or_sa)과 다른 축이라 fired_marker_join_on
  # override가 필요하다(discovery.yaml S92와 같은 이유, S31→S62처럼 축이 같으면
  # 필요 없다). `S67`/`S68`(같은 pod-axis 체인이지만 다른 전조 - 임시 컨테이너/
  # 시스템 네임스페이스 배치)과 달리, `S94`는 이 시나리오가 실제로 완주해 발화했을
  # 때만 매칭되므로 "웹 계층 침투 → RBAC 상승 → 위험한 pod 생성"이라는 이
  # 시나리오의 전체 서사와 "그 pod에서 실제 악성 행위 확인"을 명시적으로 인과적으로
  # 잇는다(S67/S68은 각자 독립된 전조와 이어질 뿐 S85와는 무관).
  #
  # join_on=user_or_sa: stage1/2(WAS)의 actor_identity → stage3/4(k8s_audit)의
  # user.name 브릿지는 S59/S83이 이미 증명한 것과 같은 메커니즘(enrichment.py의
  # target_name 기반 정적 매핑, normalizer.py 직접 확인).
  #
  # mitre_technique_id=T1190: 이 시나리오의 헤드라인("웹 계층에서의 최초 인증
  # 우회")을 반영해 S60/S84와 같은 태그를 물려받는다. severity=4는 S59/S83과
  # 같은 급 - 확정적 전체 침해 체인.
  - id: S85
    name: "인증 우회 → 관리 콘솔 접근 → RBAC 권한 상승 (WAF/WAS → K8s Audit)"
    type: sequence
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [was, k8s_audit]
    window_seconds: 300
    stamps_fired_marker: true
    fired_marker_join_on: pod
    stage1:
      event_module: was
      url_path_prefix: "/rest/admin/application-configuration"
      http_response_status_code: [401, 403]
    stage2:
      event_module: was
      url_path_prefix: "/rest/admin/application-configuration"
      http_response_status_code: 200
    stage3:
      event_module: k8s_audit
      audit_verb: [create, delete, deletecollection, patch, update]
      orchestrator_resource_type: [clusterroles, clusterrolebindings, roles, rolebindings]
    stage4:
      event_module: k8s_audit
      audit_verb: create
      orchestrator_resource_type: pods
      audit_pod_security_flags_any: [privileged, host_network, host_pid, host_ipc, host_path_volume]
    severity: 4
    mitre_technique_id: "T1190"

  # S90 (cardinality, join_on=rule_id, 2026-07-20, Notion "여러 계층 시나리오"
  # M32 구현, 엔진 확장 포함): 지금까지의 모든 시나리오는 "한 발신지(IP/신원)가
  # 한 대상을 계속 두드린다"는 축으로 join한다 - 이건 반대로 "같은 공격 시그니처가
  # 서로 다른 여러 pod에 짧은 시간 안에 동시다발적으로 나타나는지"를 본다. 하나의
  # IP가 순차적으로 스캔하는 것과 달리, 짧은 시간에 여러 대상에서 동일 시그니처가
  # 동시에 뜨면 자동화된 전파(웜)이거나 여러 소스 IP를 쓰는 협조 공격일 가능성이
  # 높다.
  #
  # join_key를 "공격자"가 아니라 "공격 시그니처"로 잡는 이 카탈로그 최초의
  # 시나리오라, app/rules.py의 _join_key()에 rule_id 축을 새로 추가하는 엔진
  # 확장이 선행됐다(2026-07-20, 이 시나리오와 함께 커밋) - event.rule_id는 이미
  # waf/was/falco가 채우는 필드라 새 필드는 필요 없었다.
  #
  # threshold=3/60s는 초기 추정치(다른 cardinality 시나리오와 같은 이유 - 실측
  # 트래픽 기준선이 아직 없음, verdict 피드백 루프로 나중에 조정할 것).
  # mitre_technique_id=T1190은 S4/S55/S60/S84와 같은 태그 - 근본적으로 같은
  # "공개 웹앱 익스플로잇 시도"를 다른 조인 축(단일 발신지 vs 시그니처 확산)으로
  # 보는 것뿐이다.
  - id: S90
    name: "여러 pod에 걸친 동일 공격 시그니처의 짧은 확산 (웜형 자동 전파 탐지)"
    type: cardinality
    join_on: rule_id
    correlation_key_type: "rule.id"
    required_modules: [waf]
    window_seconds: 60
    threshold: 3
    cooldown_seconds: 300
    distinct_field: orchestrator_resource_name
    match:
      event_module: waf
    severity: 4
    mitre_technique_id: "T1190"

  # S97/S98 (cardinality, join_on=user_or_sa, 2026-07-20, Notion "여러 계층
  # 시나리오" M29 구현, S17/S24 후속): S17(NodePort Service 노출)/S24(TLS 없는
  # Ingress 노출)은 둘 다 threshold=1·cooldown_seconds=600이라, 같은 이름의
  # 리소스를 반복 노출해도 쿨다운 동안은 조용하다 - 공격자(또는 내부자)가 매번
  # 다른 이름으로 만들었다 지우기를 반복하면(각 이름은 처음 등장이라 매번 S17/S24
  # 자체는 계속 개별 발화하지만, "이름이 계속 바뀐다"는 반복 패턴 자체는 아무도
  # 못 본다) 쿨다운을 우회하면서 계속 새 노출 경로를 만들어낼 수 있다. `S17`/`S24`의
  # 개별 발화를 대체하는 게 아니라, 그 반복 패턴을 보완하는 별개 시나리오다 -
  # `S62`(M19)/`S96`(M26)과 같은 "쿨다운/threshold 우회 대응" 계열.
  #
  # distinct_field=orchestrator_resource_name - 새 필드가 필요 없었다. k8s_audit
  # 이벤트는 objectRef.name을 이미 이 필드로 채우고 있어서(schemas.py, 모든
  # 리소스 타입에 공통) "노출된 리소스 이름" 자체가 바로 이 값이다(S96의
  # audit_binding_subject처럼 request body를 새로 파싱할 필요가 없는 가장 단순한
  # 경우).
  #
  # S17/S24를 하나로 합치지 않고 둘로 나눈 이유 - 두 시나리오의 match 조건이
  # 구조적으로 다른 필드(services는 audit_service_type, ingresses는
  # audit_ingress_has_tls)를 요구해서 한 이벤트가 둘 다 가질 수 없다(_matches()는
  # match의 모든 키를 AND로 검사하므로, 한 match에 두 조건을 같이 넣으면 어느
  # 쪽도 항상 불충족된다) - S45~S49(민감 파일 각 액션별로 별도 시나리오)와 같은
  # 이유로 분리 유지. S98의 audit_verb를 create만으로 좁힌 것도 S24와 동일한
  # 이유 - normalizer.py의 _audit_ingress_has_tls는 verb=="create"에서만
  # 계산되므로(update/patch는 이 필드가 항상 None) S24의 verb 범위를 그대로
  # 물려받아야 한다.
  #
  # window_seconds/cooldown_seconds=1800은 S62/S96과 같은 low-and-slow 시간
  # 스케일 - 이름을 바꿔가며 반복하는 회피 전략 자체가 S17/S24의 600초 쿨다운보다
  # 넓은 시간에 걸쳐 진행될 걸 전제한다. threshold=3은 S96(5)보다 낮게 잡았다 -
  # 개별 노출(S17/S24) 각각이 이미 그 자체로 위험 신호(severity=3)라, 그런
  # 신호가 서로 다른 이름으로 3번만 반복돼도 "우연히 여러 개 만들었다"보다는
  # "의도적으로 이름을 바꿔가며 반복한다"는 패턴으로 보기에 충분하다고 판단했다.
  # ⚠️ 다른 cardinality 시나리오와 같은 이유로 실측 기준선이 아직 없어 오탐
  # 튜닝이 필요하다 - 특히 CI/CD가 배포마다 임시 이름(해시 접미사 등)으로
  # Service/Ingress를 재생성하는 정상 운영과 겹칠 수 있음.
  #
  # mitre_technique_id=T1133: S17/S24의 태그를 그대로 물려받는다(S60/S61이
  # 이미 쓰는 컨벤션). severity=4는 S17/S24(3)보다 위 - 개별 노출 하나하나도
  # 위험하지만, "쿨다운을 우회하려고 이름을 계속 바꾸는" 패턴 자체가 우연이
  # 아니라 의도적 회피 시도라는 더 확정적인 신호를 더한다(S62가 S31 대비
  # severity를 올린 것과 같은 논리).
  - id: S97
    name: "이름을 바꿔가며 반복되는 NodePort Service 노출 정황"
    type: cardinality
    join_on: user_or_sa
    correlation_key_type: "user.name"
    required_modules: [k8s_audit]
    window_seconds: 1800
    threshold: 3
    cooldown_seconds: 1800
    distinct_field: orchestrator_resource_name
    match:
      event_module: k8s_audit
      audit_verb: [create, update, patch]
      orchestrator_resource_type: services
      audit_service_type: NodePort
    severity: 4
