entryPoints:
  otlp-grpc:
    address: ":4317"
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

api:
  dashboard: true
  insecure: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: siem-net

# Vercel 프론트(HTTPS)가 이 백엔드를 mixed-content 차단 없이 호출하려면 여기도
# TLS가 필요하다(2026-07-16). 아직 실제 도메인이 없어서, IP를 그대로 호스트네임
# 처럼 쓰게 해주는 무료 서비스 sslip.io(예: 35-216-79-173.sslip.io ->
# 35.216.79.173)를 씀 - 이것도 진짜 서브도메인이라 HTTP-01 챌린지가 정상 통과한다.
# 실제 도메인을 나중에 사면 이 리졸버는 그대로 두고 각 라우터의 Host() 규칙만
# 새 도메인으로 바꾸면 된다. storage 파일은 600 권한이어야 Traefik이 기동한다
# (배포 절차에 chmod 600 포함되어 있어야 함).
certificatesResolvers:
  letsencrypt:
    acme:
      email: yongwook0001@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}
