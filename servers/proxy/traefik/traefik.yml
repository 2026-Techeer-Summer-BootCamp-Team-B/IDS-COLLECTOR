entryPoints:
  otlp-grpc:
    address: ":4317"
  # OTLP HTTP 인그레스 전용 엔트리포인트(2026-07-17) - :443(websecure)에 경로
  # 기반으로 얹지 않고 이렇게 따로 뺐다. TLS clientAuth(mTLS)는 라우터가 아니라
  # "엔트리포인트+SNI" 단위로 핸드셰이크 시점에 적용되는데, :443은 이미
  # platform-api(브라우저 요청, 클라이언트 인증서 없음)가 같은 도메인으로 쓰고
  # 있어서 같은 엔트리포인트에 얹으면 두 라우터가 서로 다른 clientAuth 요구사항을
  # 가질 수 없다(하나로 합쳐짐) - 브라우저 요청까지 클라이언트 인증서를 요구하게
  # 되거나, 반대로 mTLS 자체가 무력화된다. otlp-grpc(4317)가 이미 별도
  # 엔트리포인트인 것과 같은 이유로 4318도 분리.
  otlp-http:
    address: ":4318"
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

api:
  dashboard: true
  insecure: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: siem-net
  # otlp-grpc/otlp-http의 mTLS 옵션(tls.options의 clientAuth) 정의용 - docker
  # 라벨 프로바이더는 라우터/서비스 라벨만 지원하고 이런 TLS 세부 옵션은 못
  # 담는다. dynamic/ 아래 YAML 파일들을 읽는다(현재는 tls-options.yml 하나).
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Vercel 프론트(HTTPS)가 이 백엔드를 mixed-content 차단 없이 호출하려면 여기도
# TLS가 필요하다(2026-07-16). 아직 실제 도메인이 없어서, IP를 그대로 호스트네임
# 처럼 쓰게 해주는 무료 서비스 sslip.io(예: 35-216-79-173.sslip.io ->
# 35.216.79.173)를 씀 - 이것도 진짜 서브도메인이라 HTTP-01 챌린지가 정상 통과한다.
# 실제 도메인을 나중에 사면 이 리졸버는 그대로 두고 각 라우터의 Host() 규칙만
# 새 도메인으로 바꾸면 된다. storage 파일은 600 권한이어야 Traefik이 기동한다
# (배포 절차에 chmod 600 포함되어 있어야 함).
certificatesResolvers:
  letsencrypt:
    acme:
      email: yongwook0001@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}
