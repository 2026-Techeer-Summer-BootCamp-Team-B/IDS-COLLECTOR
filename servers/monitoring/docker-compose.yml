# SISM 독립 Observability 스택.
#
# 기존 siem-net(otel-collector/OpenSearch/Kafka/Postgres/ClickHouse/platform-api가
# 붙어 있는 네트워크)은 절대 건드리지 않는다 - 여기서는 external: true로 "참조"만
# 하고, 이 스택 자신의 서비스 간 통신은 별도의 monitoring 네트워크를 쓴다.
# siem-net에 join하는 건 기존 컨테이너를 이름으로 찾아가야 하는 서비스(현재는
# kafka-exporter, 나중엔 postgres/opensearch/clickhouse-exporter)뿐이다.
#
# 모든 내부 전용 포트(9090/9100/8080/9308 등)는 ${HOST_INTERNAL_IP}(VM의 사설 IP)
# 로만 게시한다 - GCP 방화벽 규칙이 유일한 방어선이 되지 않도록 바인딩 자체를
# 내부망으로 제한하는 이중 방어. Grafana(3000)만 0.0.0.0으로 게시해 외부 접근을
# 허용한다. 방화벽 규칙 설정은 README 배포 절차 참고.

networks:
  monitoring:
    driver: bridge
  siem-net:
    external: true

services:
  # ------------------------------------------------------------------
  # Prometheus
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534" # nobody - ./data/prometheus 소유권을 이 uid:gid로 맞춰둘 것(README 참고)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d" # 보존 30일
      - "--web.enable-lifecycle" # POST /-/reload로 무중단 설정 리로드
    ports:
      - "${HOST_INTERNAL_IP}:9090:9090" # 내부망 전용
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Grafana - 유일하게 외부(퍼블릭 NIC) 접근을 허용하는 서비스
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: grafana
    restart: unless-stopped
    user: "472:472" # grafana 기본 uid - ./data/grafana 소유권을 맞춰둘 것(README 참고)
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000" # 유일하게 0.0.0.0 게시 - 외부 접근 허용 대상
    depends_on:
      - prometheus
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Node Exporter - GCP VM 호스트 메트릭
  # ------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "${HOST_INTERNAL_IP}:9100:9100" # 내부망 전용
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------------------------
  # cAdvisor - 컨테이너 메트릭
  # ------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: unless-stopped
    privileged: true # 컨테이너 런타임/cgroup 전반에 접근하기 위해 필요(공식 권장 구성)
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${HOST_INTERNAL_IP}:8080:8080" # 내부망 전용
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------------------------
  # Kafka Exporter - 기존 kafka 컨테이너(siem-net) 참조
  # ------------------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    restart: unless-stopped
    command:
      - "--kafka.server=${KAFKA_EXPORTER_KAFKA_SERVER}"
    ports:
      - "${HOST_INTERNAL_IP}:9308:9308" # 내부망 전용
    networks:
      - monitoring # Prometheus가 스크레이프
      - siem-net # kafka:9092에 도달하기 위함 (기존 네트워크, 참조만 함)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================================================================
  # 향후 확장 대상 (활성화 전까지 주석 유지)
  # 활성화 절차: 1) .env에 해당 값 채우기 2) 아래 블록 주석 해제
  # 3) prometheus.yml의 대응 scrape_configs 블록도 주석 해제 4) docker compose up -d
