networks:
  siem-net:
    external: true

# REDIS_URL의 비밀번호는 servers/datastore/redis/.env(.env.example 복사본)의
# REDIS_PASSWORD와 일치해야 한다 - 별도 docker-compose 프로젝트라 .env를 공유할
# 수 없어서 값을 여기 그대로 옮겨 적었다. dev 기본값(CHANGE_ME_dev) 대신 실제
# 비밀번호로 바꾸려면 두 곳(servers/datastore/redis/.env, 여기 3곳 - REDIS_URL은
# normalizer/correlation-engine/platform-api 셋 다, POSTGRES_DSN은 correlation-engine/
# platform-api 둘 - normalizer는 2026-07-15 exclusion_rules 기능 제거로 더 이상
# Postgres에 연결하지 않는다) 전부 같이 바꿀 것.
#
# POSTGRES_DSN/CLICKHOUSE_PASSWORD는 ${} 참조다 - 이 프로젝트(servers/)의 .env에서
# 값을 채운다(servers/.env.example 참고). Postgres는 servers/datastore/postgres/.env의
# POSTGRES_PASSWORD와, ClickHouse는 servers/datastore/clickhouse/.env의
# CLICKHOUSE_PASSWORD와 반드시 같은 값이어야 한다 - 이것도 별도 프로젝트라 .env
# 공유가 안 돼서 servers/.env에 따로 값을 둔다.
services:
  normalizer:
    # 빌드 컨텍스트를 servers/ 루트로 잡는다 - normalizer/correlation-engine이 공유하는
    # NormalizedEvent 스키마(shared/ids_shared)를 이미지에 COPY하려면 각자의 하위
    # 디렉터리만으로는 컨텍스트 밖이라 접근이 안 된다.
    build:
      context: .
      dockerfile: normalizer/Dockerfile
    container_name: normalizer
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKERS: kafka:9092
      KAFKA_SOURCE_TOPICS: events.was,events.waf,events.falco,events.audit
      KAFKA_CONSUMER_GROUP: normalizer-workers
      KAFKA_NORMALIZED_TOPIC: events.normalized
      KAFKA_DLQ_TOPIC: events.dlq
      REDIS_URL: redis://:CHANGE_ME_dev@redis:6379/0
    ports:
      - "127.0.0.1:8200:8200" # 로컬 디버깅용 - 호스트 루프백에만 바인딩(Traefik 단일 진입점 원칙)
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - json-file 기본 드라이버는 회전이
    # 없어 무기한 누적된다. Kafka 컨슈머라 이벤트당 로그가 나는 다변 서비스라 50m×3.
    # 컨테이너 재생성(docker compose up -d --force-recreate) 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    # curl/wget이 python:3.11-slim 기본 이미지에 없어서 표준 라이브러리(urllib)로 대신한다.
    # urlopen은 HTTP 응답이 4xx/5xx면 예외를 던지므로 /health가 503을 반환하면(컨슈머
    # 태스크 죽음) 이 커맨드도 실패해서 그대로 unhealthy로 잡힌다.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  correlation-engine:
    build:
      context: .
      dockerfile: correlation-engine/Dockerfile
    container_name: correlation-engine
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKERS: kafka:9092
      KAFKA_NORMALIZED_TOPIC: events.normalized
      KAFKA_CONSUMER_GROUP: correlation-engine
      REDIS_URL: redis://:CHANGE_ME_dev@redis:6379/0
      POSTGRES_DSN: postgresql://ids_admin:${POSTGRES_PASSWORD}@postgres:5432/ids_platform
    ports:
      - "127.0.0.1:8300:8300" # 로컬 디버깅용 - 호스트 루프백에만 바인딩(Traefik 단일 진입점 원칙)
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 다변 서비스라 50m×3. 컨테이너
    # 재생성(--force-recreate) 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  platform-api:
    # normalizer/correlation-engine과 같은 이유로 빌드 컨텍스트를 servers/ 루트로
    # 잡는다 - mitre_mapping 카탈로그(shared/ids_shared)를 이미지에 COPY하려면
    # 각자의 하위 디렉터리만으로는 컨텍스트 밖이라 접근이 안 된다.
    build:
      context: .
      dockerfile: platform-api/Dockerfile
    container_name: platform-api
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_DSN: postgresql://ids_admin:${POSTGRES_PASSWORD}@postgres:5432/ids_platform
      REDIS_URL: redis://:CHANGE_ME_dev@redis:6379/0
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "127.0.0.1:8400:8400" # 로컬 디버깅 편의용 직결 포트(호스트 루프백에만 바인딩, forwardAuth 미적용) - 실제 진입 경로는 Traefik(:80/api). 원격 호스트에서 직결하려면 SSH 터널 필요(예: ssh -L 8400:localhost:8400 <host>)
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=siem-net"
      - "traefik.http.services.platform-api.loadbalancer.server.port=8400"

      # /api/auth/* (login/logout/session)은 인증 자체를 다루는 엔드포인트라 forwardAuth
      # 없이 통과 - 이 라우터가 더 구체적인 rule이라 platform-api 라우터보다 우선순위가
      # 높아야 하므로 priority를 명시적으로 더 크게 준다(Traefik 기본 룰 길이 기반 우선순위에
      # 기대지 않음).
      - "traefik.http.routers.platform-api-public.entrypoints=web"
      - "traefik.http.routers.platform-api-public.rule=PathPrefix(`/api/auth`) || Path(`/api/health`)"
      - "traefik.http.routers.platform-api-public.priority=20"
      - "traefik.http.routers.platform-api-public.middlewares=platform-api-stripprefix"
      - "traefik.http.routers.platform-api-public.service=platform-api"

      # 나머지 /api/* 전부 - forwardAuth로 인증을 강제(P5-2, 앱 레벨 Depends는 다 뺐음).
      # verify 엔드포인트가 200으로 응답하면서 실어주는 X-Auth-* 헤더를 그대로
      # platform-api로 전달해서 감사 로그 등에서 실제 유저를 식별한다.
      - "traefik.http.routers.platform-api.entrypoints=web"
      - "traefik.http.routers.platform-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.platform-api.priority=10"
      - "traefik.http.routers.platform-api.middlewares=platform-api-stripprefix,platform-api-auth"

      - "traefik.http.middlewares.platform-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.platform-api-auth.forwardauth.address=http://platform-api:8400/auth/verify"
      - "traefik.http.middlewares.platform-api-auth.forwardauth.authResponseHeaders=X-Auth-User-Id,X-Auth-Username,X-Auth-Role"

      # 위 두 라우터의 TLS 버전(2026-07-16, Vercel 프론트 mixed-content 회피용) -
      # 기존 :80 라우터는 손대지 않고 그대로 두고(하위호환), :443에 Host() 규칙이
      # 걸린 라우터를 추가로 얹는다. Host()가 있어야 Traefik이 어떤 도메인으로
      # 인증서를 받을지 알 수 있다 - 아직 실제 도메인이 없어서 sslip.io(IP를
      # 그대로 서브도메인처럼 씀)를 쓴다. 실제 도메인을 사면 이 Host() 값만
      # 새 도메인으로 바꾸면 됨.
      - "traefik.http.routers.platform-api-public-secure.entrypoints=websecure"
      - "traefik.http.routers.platform-api-public-secure.rule=Host(`35-216-79-173.sslip.io`) && (PathPrefix(`/api/auth`) || Path(`/api/health`))"
      - "traefik.http.routers.platform-api-public-secure.priority=20"
      - "traefik.http.routers.platform-api-public-secure.middlewares=platform-api-stripprefix"
      - "traefik.http.routers.platform-api-public-secure.service=platform-api"
      - "traefik.http.routers.platform-api-public-secure.tls.certresolver=letsencrypt"

      - "traefik.http.routers.platform-api-secure.entrypoints=websecure"
      - "traefik.http.routers.platform-api-secure.rule=Host(`35-216-79-173.sslip.io`) && PathPrefix(`/api`)"
      - "traefik.http.routers.platform-api-secure.priority=10"
      - "traefik.http.routers.platform-api-secure.middlewares=platform-api-stripprefix,platform-api-auth"
      - "traefik.http.routers.platform-api-secure.tls.certresolver=letsencrypt"

  dashboard:
    # 빌드 컨텍스트가 다른 서비스들과 다르게 dashboard/ 자신이다 - Node 빌드에
    # servers/의 공유 스키마가 전혀 필요 없기 때문(dashboard/Dockerfile 참고).
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=siem-net"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"

      # "/" 캐치올 - platform-api 라우터들(priority 10/20)보다 낮은 우선순위를 줘서
      # /api/*는 항상 platform-api가 먼저 채간다. 나머지 전부(정적 파일 + SPA 새로고침
      # 진입 경로)는 dashboard의 nginx가 처리(dashboard/nginx.conf의 index.html fallback).
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`)"
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.routers.dashboard.service=dashboard"
