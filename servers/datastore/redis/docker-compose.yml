networks:
  siem-net:
    external: true

# NOTE: local-dev setup. requirepass 적용됨(.env의 REDIS_PASSWORD) - .env.example을
# .env로 복사해서 쓰되, dev 기본값(CHANGE_ME_dev)이 아닌 실제 배포에서는 반드시 교체할 것.
# 용도: normalizer의 dedupe 키(SETNX, TTL 1h)와 correlation-engine의 시나리오
# 윈도우/쿨다운 상태 저장. 둘 다 짧은 TTL의 휘발성 캐시로만 쓰고, 영속 데이터는
# 전부 Postgres/OpenSearch 쪽에 있으므로 AOF/RDB 영속성은 필요 없다.
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - siem-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
