networks:
  siem-net:
    external: true

# NOTE: local-dev setup. Copy .env.example to .env and set real credentials
# before use outside a throwaway environment.
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # -d 없이 -U만 주면 pg_isready가 대상 데이터베이스명을 유저명(ids_admin)으로
      # 기본 가정하는데, 실제 DB명은 POSTGRES_DB(ids_platform)라 매번
      # "database \"ids_admin\" does not exist" FATAL이 postgres 로그에 10초마다
      # 쌓인다(헬스체크 자체는 서버 응답만 보면 통과라 기능상 무해하지만, 로그
      # 노이즈가 진짜 에러를 찾기 어렵게 만든다 - 실측 확인, 2026-07-14).
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
