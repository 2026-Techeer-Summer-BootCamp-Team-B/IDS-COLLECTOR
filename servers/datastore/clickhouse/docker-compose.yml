networks:
  siem-net:
    external: true

# NOTE: local-dev setup. .env.example을 .env로 복사해서 쓰되, dev 기본값
# (CHANGE_ME_dev)이 아닌 실제 배포에서는 반드시 교체할 것. CLICKHOUSE_PASSWORD는
# servers/.env(servers/docker-compose.yml의 platform-api가 ${CLICKHOUSE_PASSWORD}로
# 참조)와 반드시 같은 값이어야 한다 - 별도 docker-compose 프로젝트라 .env를 공유할
# 수 없어서 두 곳에 따로 둠.
# P6-3(ClickHouse 예약) 항목 - 대량 데이터 병행 분석 대비 선탑재. 현재 필수 경로 아님.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.4
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123" # http
      - "127.0.0.1:9000:9000" # native
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - siem-net
    # 로그 로테이션 - 컨테이너 재생성(--force-recreate)시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # init/(docker-entrypoint-initdb.d)는 데이터 디렉터리가 이미 있으면 통째로
  # 건너뛰어서(실측 확인) 이미 떠 있는 배포에는 새 컬럼/뷰가 반영되지 않는다 -
  # 이 서비스가 migrations/*.sql을 `docker compose up`마다 매번(컨테이너가
  # 처음이 아니어도) 순서대로 실행해서 그 간극을 메운다. 스크립트 자체가 멱등
  # (ADD COLUMN IF NOT EXISTS 등)하도록 작성하는 게 원칙 - 그래야 몇 번을 다시
  # 실행해도 안전하다(migrations/002-actor-identity.sql 참고).
  clickhouse-migrate:
    image: clickhouse/clickhouse-server:26.4
    container_name: clickhouse-migrate
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    networks:
      - siem-net
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - >
        for f in /migrations/*.sql; do
          echo "applying $$f";
          clickhouse-client --host clickhouse --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --multiquery < "$$f" || exit 1;
        done

volumes:
  clickhouse-data:
