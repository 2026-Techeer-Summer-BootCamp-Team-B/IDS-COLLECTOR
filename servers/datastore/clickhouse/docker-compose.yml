networks:
  siem-net:
    external: true

# NOTE: local-dev setup. No auth configured beyond the default admin user below.
# P6-3(ClickHouse 예약) 항목 - 대량 데이터 병행 분석 대비 선탑재. 현재 필수 경로 아님.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.4
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123" # http
      - "127.0.0.1:9000:9000" # native
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: mypassword
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - siem-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
