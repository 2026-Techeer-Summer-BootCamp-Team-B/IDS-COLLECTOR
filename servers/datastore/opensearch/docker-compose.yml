networks:
  siem-net:
    external: true

# NOTE: local-dev setup. Security plugin disabled (no TLS/auth) for simplicity.
services:
  opensearch:
    image: opensearchproject/opensearch:2.19.6
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # 보안 플러그인이 비활성화돼 있어(plugins.security.disabled) 이 값 자체는
      # 최종적으로는 미사용이지만, install_demo_configuration.sh(보안 플러그인
      # 데모 설치 스크립트)가 plugins.security.disabled 값과 무관하게 컨테이너
      # 기동 과정에서 이 값의 강도(대문자/소문자/숫자/특수문자 전부 포함, 8자
      # 이상)를 검증한다 - 단순 "CHANGE_ME_dev"로 바꿨다가 검증 실패로 컨테이너가
      # 계속 재시작하는 걸 실기동으로 확인했다(2026-07-16, docs/reports/
      # high-patch-20260716.md). 실제 비밀번호처럼 보이던 원래 문자열은 placeholder로
      # 교체하되(감사 S3, docs/reports/repo-audit-20260715.md), 강도 요건은 만족시켜야
      # 함 - 보안 플러그인을 나중에 켜면 이 값이 실제 admin 비밀번호가 되므로 그때는
      # 반드시 실값으로 바꿀 것.
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "CHANGE_ME_dev1!"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 두 파이프라인을 같이 돌린다 (datastore/opensearch/config/data-prepper/pipelines.yaml):
  # 1) events.was/waf/falco/audit 원본 -> otel-logs-raw-* (포렌식용 사본)
  # 2) events.normalized -> attack-logs-* (정규화된 문서, _id=event.id) - normalizer의
  #    자체 색인 코드를 대체하는 지점 (P6-4).
  data-prepper:
    image: opensearchproject/data-prepper:2.16.0
    container_name: data-prepper
    restart: unless-stopped
    volumes:
      - ./config/data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml:ro
      - ./config/data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
      - ./config/data-prepper/attack-logs-template.json:/usr/share/data-prepper/config/attack-logs-template.json:ro
      - ./config/data-prepper/otel-logs-raw-template.json:/usr/share/data-prepper/config/otel-logs-raw-template.json:ro
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 선택 사항: 색인된 문서(otel-logs-raw-*, attack-logs-*)를 눈으로 확인하고 싶을 때만
  # 붙이는 브라우저 UI. 우리 자체 SENTINEL-OPS 대시보드(dashboard/)와는 별개이고,
  # 파이프라인 동작에는 필요 없음 - Discover 탭으로 원본 로그 훑어볼 때만 쓰는 용도.
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.6
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true" # opensearch 쪽 security.disabled=true와 맞춤
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 컨테이너 재생성(--force-recreate)
    # 시에만 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  opensearch-data:
