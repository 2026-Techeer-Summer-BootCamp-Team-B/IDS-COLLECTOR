networks:
  siem-net:
    external: true

# gRPC(4317) - Traefik은 이제 이 포트를 TLS 패스스루(TCP 라우터, SNI만 보고 그대로
# 흘려보냄)로만 다룬다. mTLS 종단(서버 인증서 제시 + 클라 인증서 검증)은 otel-collector
# 자신이 직접 한다 - Traefik의 passTLSClientCert 미들웨어가 scheme=h2c 백엔드 조합에서
# 헤더를 안 넘기는 걸 실측으로 확인(2026-07-15)했고, 그 우회로 커스텀 컬렉터
# (custom-collector/, mtlsclientauth 확장)를 빌드해 otelcol이 검증된 클라 인증서의
# CN을 직접 auth.cn으로 노출하게 함. HTTP(4318)는 이 문제와 무관해서 그대로 직접 노출.
services:
  otel-collector:
    build: ./custom-collector
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-config.yaml"]
    volumes:
      - ./config/otel-config.yaml:/etc/otel/otel-config.yaml:ro
      # step-ca가 발급한 서버 인증서/키 + CA - Traefik이 쓰던 것과 동일한 파일을 그대로
      # 재사용 (SNI/클라가 접속하는 hostname "traefik"과 인증서 SAN이 이미 맞춰져 있음).
      - ../proxy/traefik/certs/traefik-server.crt:/etc/otel/certs/server.crt:ro
      - ../proxy/traefik/certs/traefik-server.key:/etc/otel/certs/server.key:ro
      - ../proxy/traefik/certs/ca.crt:/etc/otel/certs/ca.crt:ro
    ports:
      - "4318:4318"
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 이벤트마다 로그가 나는 다변
    # 서비스라 50m×3(항목 6에서 debug exporter를 4개 소스에서 뺐지만 그와 별개로
    # 컨테이너 자체 로그도 회전이 필요). 컨테이너 재생성(--force-recreate) 시에만
    # 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=siem-net"
      - "traefik.http.routers.otlp-grpc.entrypoints=otlp-grpc"
      # Host()가 있어야 letsencrypt 리졸버가 어떤 도메인 인증서를 쓸지 안다
      # (platform-api-secure와 동일 패턴, servers/docker-compose.yml 참고).
      - "traefik.http.routers.otlp-grpc.rule=Host(`35-216-79-173.sslip.io`)"
      - "traefik.http.routers.otlp-grpc.service=otlp-grpc"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.scheme=h2c"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.port=4317"
      # TLS 종단 + mTLS(클라이언트 인증서 필수 검증) - Techeer 쪽 otel-collector
      # exporter가 이미 클라이언트 인증서를 붙여 보내고 있다(Techeer-12th-b/
      # otel-collector-config.yaml의 exporters.otlp.tls). CA는 proxy/traefik/certs/
      # generate-otlp-mtls-certs.sh로 발급하고 otlp-client-ca.crt를 이 경로에 둔다.
      # clientAuth/caFiles는 Docker 라벨로 정의할 수 없어(Traefik 제약) file
      # provider 쪽(proxy/traefik/dynamic/tls-options.yml)에 옵션을 정의해두고
      # 여기서는 @file로 참조만 한다.
      - "traefik.http.routers.otlp-grpc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.otlp-grpc.tls.options=otlp-mtls@file"
