networks:
  siem-net:
    external: true

# gRPC(4317)/HTTP(4318) 둘 다 Traefik의 전용 엔트리포인트(otlp-grpc/otlp-http)를
# 통해서만 들어온다 - Traefik이 TLS 종단 + mTLS(클라이언트 인증서 필수 검증)까지
# 끝내고, 검증을 통과한 트래픽만 각각 h2c(gRPC, 평문 HTTP/2)/http(HTTP, 평문
# HTTP/1.1)로 이 컨테이너에 전달한다(2026-07-17). otel-collector 자신은 TLS를
# 전혀 모른다 - 아래 otel-config.yaml에도 tls: 블록이 없고, 이미지도 stock
# otel/opentelemetry-collector-contrib 그대로다.
#
# 클라이언트 인증서의 CN/SAN을 이 컨테이너(파이프라인)로 넘기는 기능은 의도적으로
# 안 만들었다 - Traefik의 passTLSClientCert 미들웨어를 gRPC(h2c) 백엔드 조합에
# 쓰면 그 미들웨어가 주입하는 헤더가 여기까지 전달되지 않는 문제가 실측으로
# 확인됐다(Traefik v3.7). 그래서 "유효한 인증서를 제시했는가"까지만 Traefik이
# 판정하고 통과시키는 것으로 요구사항 자체를 좁혔다 - 그 인증서가 정확히 누구
# 것인지는 이 파이프라인 어디에도 넘어오지 않는다.
#
# gRPC(h2c)는 h2c preface를 HTTP/1.1로 오인하는 문제가 있어(Traefik v3 +
# loadbalancer.server.scheme=h2c 조합으로 해결, 아래 labels 참고) 예전부터 별도
# 엔트리포인트였다. HTTP(4318)는 이 h2c 문제가 없어서 예전엔 그냥 직접
# 노출했었는데, 이번에 4317과 같은 이유(단일 진입점 + mTLS)로 Traefik 뒤로
# 옮겼다 - 그래서 이 서비스엔 이제 호스트 포트 바인딩이 전혀 없다(둘 다
# proxy/docker-compose.yml의 Traefik 컨테이너가 4317/4318을 호스트에 노출하고,
# 여기로는 siem-net 안에서만 도달 가능).
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-config.yaml"]
    volumes:
      - ./config/otel-config.yaml:/etc/otel/otel-config.yaml:ro
    networks:
      - siem-net
    # 로그 로테이션(2026-07-16, 감사 O16/§3.6) - 이벤트마다 로그가 나는 다변
    # 서비스라 50m×3(항목 6에서 debug exporter를 4개 소스에서 뺐지만 그와 별개로
    # 컨테이너 자체 로그도 회전이 필요). 컨테이너 재생성(--force-recreate) 시에만
    # 적용됨.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=siem-net"

      - "traefik.http.routers.otlp-grpc.entrypoints=otlp-grpc"
      - "traefik.http.routers.otlp-grpc.rule=Host(`35-216-79-173.sslip.io`)"
      - "traefik.http.routers.otlp-grpc.tls=true"
      - "traefik.http.routers.otlp-grpc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.otlp-grpc.tls.options=mtls-client-ca@file"
      - "traefik.http.routers.otlp-grpc.service=otlp-grpc"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.scheme=h2c"
      - "traefik.http.services.otlp-grpc.loadbalancer.server.port=4317"

      - "traefik.http.routers.otlp-http.entrypoints=otlp-http"
      - "traefik.http.routers.otlp-http.rule=Host(`35-216-79-173.sslip.io`)"
      - "traefik.http.routers.otlp-http.tls=true"
      - "traefik.http.routers.otlp-http.tls.certresolver=letsencrypt"
      - "traefik.http.routers.otlp-http.tls.options=mtls-client-ca@file"
      - "traefik.http.routers.otlp-http.service=otlp-http"
      - "traefik.http.services.otlp-http.loadbalancer.server.port=4318"
