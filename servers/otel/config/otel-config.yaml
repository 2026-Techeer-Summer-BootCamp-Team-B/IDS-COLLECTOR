extensions:
  # 커스텀 확장(custom-collector/mtlsclientauth) - Traefik의 passTLSClientCert가
  # scheme=h2c 백엔드 조합에서 헤더를 안 넘기는 걸 실측 확인(2026-07-15)해서, Traefik은
  # TCP 패스스루(TLS 안 까고 그대로 전달)로 물러나고 otelcol이 mTLS를 직접 받는다.
  # 검증된 클라 인증서의 CN을 auth.cn으로 노출하는 게 이 확장의 전부다.
  mtlsclientauth: {}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /etc/otel/certs/server.crt
          key_file: /etc/otel/certs/server.key
          client_ca_file: /etc/otel/certs/ca.crt
        auth:
          authenticator: mtlsclientauth
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    # 기존 5s - 이벤트를 최대 5초까지 묶어뒀다가 Kafka로 내보내는 구조라 저볼륨
    # 트래픽(데모/테스트)에서는 이게 곧 e2e 지연에 그대로 더해짐. 1s로 낮춤.
    timeout: 500ms
    send_batch_size: 8192

  # 크로스-서버 mTLS - otelcol이 직접 검증한 클라 인증서의 CN을 mtlsclientauth
  # 확장이 auth.cn으로 노출해준다(attributesprocessor의 from_context: auth.*는
  # 서버 authenticator가 채운 값을 읽는 표준 경로). 이미 순수 CN이라 Traefik
  # 헤더 방식 때 필요했던 정규식 추출이 필요 없다.
  attributes/capture-cert-header:
    actions:
      - key: client.cn_raw
        action: insert
        from_context: auth.cn

  transform/stamp-cn:
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["client.cn"], attributes["client.cn_raw"]) where attributes["client.cn_raw"] != nil
          - delete_key(attributes, "client.cn_raw")

  # 즉시 폐기(revocation) 수단 - CRL/OCSP는 Traefik/otelcol 둘 다 네이티브로
  # 지원 안 해서(PoC엔 오버킬) CN denylist를 여기서 건다. 인증서 유효기간과
  # 무관하게 즉시 차단되지만, handshake 자체는 성공하고 TLS 이후(앱 계층)에서
  # 드롭되는 것 - 목록 갱신은 아래 편집 후 collector 재시작(짧은 blip) 필요.
  filter/denylist:
    error_mode: ignore
    logs:
      log_record:
        - resource.attributes["client.cn"] == "__no-site-denylisted-yet__"

# resource attribute `log.source`(was/waf/falco/k8s-audit, Target 쪽 otel-collector가
# 태깅) 기준으로 소스별 Kafka 토픽에 나눠 적재한다 (P2-1). 매치되는 값이 없으면
# events.unknown으로 보내서 태깅 누락을 조용히 흘리지 않고 눈에 띄게 한다.
connectors:
  routing/by-source:
    default_pipelines: [logs/unknown]
    error_mode: ignore
    table:
      - statement: route() where resource.attributes["log.source"] == "was"
        pipelines: [logs/was]
      - statement: route() where resource.attributes["log.source"] == "waf"
        pipelines: [logs/waf]
      - statement: route() where resource.attributes["log.source"] == "falco"
        pipelines: [logs/falco]
      - statement: route() where resource.attributes["log.source"] == "k8s-audit"
        pipelines: [logs/audit]

exporters:
  debug:
    verbosity: detailed
  kafka/was:
    brokers: ["kafka:9092"]
    logs:
      topic: events.was
      encoding: otlp_json
    producer:
      max_message_bytes: 10000000
  kafka/waf:
    brokers: ["kafka:9092"]
    logs:
      topic: events.waf
      encoding: otlp_json
    producer:
      max_message_bytes: 10000000
  kafka/falco:
    brokers: ["kafka:9092"]
    logs:
      topic: events.falco
      encoding: otlp_json
    producer:
      max_message_bytes: 10000000
  kafka/audit:
    brokers: ["kafka:9092"]
    logs:
      topic: events.audit
      encoding: otlp_json
    producer:
      max_message_bytes: 10000000
  kafka/unknown:
    brokers: ["kafka:9092"]
    logs:
      topic: events.unknown
      encoding: otlp_json
    producer:
      max_message_bytes: 10000000

service:
  extensions: [mtlsclientauth]
  telemetry:
    logs:
      level: "info"
  pipelines:
    logs/in:
      receivers: [otlp]
      processors: [memory_limiter, attributes/capture-cert-header, transform/stamp-cn, filter/denylist, batch]
      exporters: [routing/by-source]
    # debug(verbosity: detailed)는 4개 정상 소스 파이프라인에서 뺐다(2026-07-16,
    # 감사 O9/§3.6) - 상시 켜져 있으면 이벤트 원문(WAS 쿼리스트링, WAF 페이로드
    # 스니펫 등 자격증명·공격 페이로드가 섞일 수 있는 필드)이 컨테이너 stdout에
    # 계속 쌓이고, 로그 로테이션이 없던 상태(항목 7에서 추가)와 겹쳐 디스크
    # 누적의 가장 큰 기여 요인이었다. unknown만 예외로 남긴다(아래 참고).
    logs/was:
      receivers: [routing/by-source]
      exporters: [kafka/was]
    logs/waf:
      receivers: [routing/by-source]
      exporters: [kafka/waf]
    logs/falco:
      receivers: [routing/by-source]
      exporters: [kafka/falco]
    logs/audit:
      receivers: [routing/by-source]
      exporters: [kafka/audit]
    # log.source 태깅이 안 됐거나 미인식 값인 안전망 경로 - 정상 상태에선 깊이
    # 0이어야 하므로(계약 §1) debug exporter를 유지해서 여기로 온 이벤트의 원문을
    # 바로 확인할 수 있게 한다. 4개 정상 파이프라인과 달리 상시 대량 트래픽이
    # 흐르지 않는 경로라 디스크 누적 우려도 낮다.
    logs/unknown:
      receivers: [routing/by-source]
      exporters: [kafka/unknown, debug]
