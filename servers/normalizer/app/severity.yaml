# 심각도(event.severity) 매핑 (P3-5). 기능 설계 시트 "심각도매핑"을 그대로 옮긴 것 -
# 값을 바꿀 땐 이 파일만 고치면 되고, normalizer 코드 재배포 없이 반영하려면
# app/severity.py의 _load()를 재호출하는 리로드 엔드포인트를 나중에 추가할 것 (지금은
# 프로세스 기동 시 1회 로드).

was:
  # WAS raw access log는 기본적으로 판단 없음 -> 1 고정. HTTP 계층의 '판단(alert)'은
  # 원래 WAF 센서의 역할이고, raw access log는 맥락/통계/포렌식용으로만 흐른다 -
  # 다만 로그인 실패만은 예외로 둔다(S19 로그인 브루트포스 재료, Target 저장소
  # backend/app/middleware/gateway.py의 LOGIN_FAILURE_STATUS_CODES(401/403)와
  # 동일 기준). Juice Shop 실제 로그인 엔드포인트 경로 하드코딩(단일 타깃 전제).
  rules:
    - match: { path_prefix: "/rest/user/login", method: POST, status: [401, 403] }
      severity: 2
  default: 1

waf:
  # WafAlert 센서 스펙 기준 risk_level 값 그대로(대문자). alert 최소 severity 2.
  risk_level:
    LOW: 2
    MEDIUM: 3
    CRITICAL: 4
  default: 2

falco:
  # Falco 공식 priority 직접 매핑. DEBUG~NOTICE -> 1 / WARNING -> 2 / ERROR,CRITICAL -> 3
  # / ALERT,EMERGENCY -> 4.
  priority:
    Emergency: 4
    Alert: 4
    Critical: 3
    Error: 3
    Warning: 2
    Notice: 1
    Informational: 1
    Debug: 1
  # 시트에 default(미매치) 행은 없음 - priority가 없거나 모르는 값을 low(1)로 떨어뜨리면
  # 이상 신호가 묻힐 수 있어서 medium(2)으로 둔다.
  default: 2

audit:
  # verb+resource(+subresource) 매핑, 첫 매치 우선. audit level(RequestResponse 등) 기반
  # 매핑은 폐기 - level은 '얼마나 자세히 기록할지'이지 '얼마나 위험한지'가 아니라서
  # RBAC 변경 같은 severity 4가 그 방식으론 영영 안 나온다.
  rules:
    # 4 critical: RBAC 변경 = 권한상승의 정점 (S3 stage1 재료). verb 범위는 K8s API의
    # RBAC 오브젝트 변경 verb 전체(create/delete/deletecollection/patch/update)로 확정 -
    # RBAC verb TBD 갭 해소. "replace"는 k8s audit verb에 실존하지 않는다(PUT도
    # "update"로 남는다) - 오탈자였다. 대신 deletecollection(kubectl delete
    # clusterroles --all 같은 대량 삭제)이 빠져 있어서 severity가 default(2)로
    # 떨어지는 게 진짜 버그였다. (falcosecurity/plugins의 실제 k8s_audit_rules.yaml은
    # 여기서 더 나아가 role.rules의 wildcard/write 권한, cluster-admin 바인딩까지
    # request body로 판정하지만, 그건 normalize_audit()의 body 파싱 확장이 필요함.)
    # resource 목록(roles/clusterroles/rolebindings/clusterrolebindings)은
    # ids_shared.k8s_constants.RBAC_ALL_RESOURCES와 같은 뜻 - Python 상수를 YAML에
    # 자동 주입하진 않으므로(이 파일은 사람이 직접 값만 보고 고치는 걸 우선한다),
    # 그 목록이 바뀌면 여기도 같이 고칠 것. 같은 목록이 correlation-engine/app/
    # scenarios/rbac.yaml(S3/S11/S12/S13)과 Techeer-12th-b/k3d-audit-policy.yaml에도 있다.
    - match: { verb: [create, delete, deletecollection, patch, update], resource: [clusterroles, clusterrolebindings, roles, rolebindings] }
      severity: 4
    # 4 critical: 시스템 네임스페이스(kube-system/kube-public)에 서비스어카운트 생성
    # (S6 재료) - falcosecurity/plugins의 "Service Account Created in Kube Namespace"
    # 룰과 동일 판정. subresource: ""로 SA 토큰 발급(subresource=token, 아래 규칙)과
    # 구분 - 이건 SA "오브젝트 자체"의 생성만 잡는다. namespace 목록은
    # ids_shared.k8s_constants.SYSTEM_NAMESPACES와 같은 뜻(rbac.yaml S6, workload.yaml
    # S15에도 같은 목록이 있다 - 바뀌면 같이 고칠 것).
    - match: { verb: [create], resource: [serviceaccounts], subresource: "", namespace: [kube-system, kube-public] }
      severity: 4
    # 3 high: 자격증명 탈취 (S2 재료)
    - match: { verb: [get, list], resource: [secrets] }
      severity: 3
    # 3 high: 시크릿 생성/변조 - 조회와 동급 이상 (§5 갱신분 신규 추가)
    - match: { verb: [create, update, patch], resource: [secrets] }
      severity: 3
    # 3 high: 실행 중 컨테이너 진입 (S1/S3 재료). verb는 create만이 아니라 get도
    # 포함 - falcosecurity/plugins의 "Attach/Exec Pod" 룰 조건이
    # "(kcreate or kget) and subresource in (exec,attach)"라 실제로 verb=get으로
    # 기록되는 exec/attach 요청도 있다(재확인 완료, 2026-07-12). create만 보면
    # 그런 이벤트가 severity 3이 아니라 default(2)로 떨어지는 게 버그였다.
    - match: { verb: [create, get], resource: [pods], subresource: [exec, attach] }
      severity: 3
    # 3 high: SA 토큰 발급
    - match: { verb: [create], resource: [serviceaccounts], subresource: [token] }
      severity: 3
    # 3 high: 흔적 삭제·파괴. '대량 delete'의 '대량' 판정은 단건 정규화 단계에서 불가능
    # 하므로 delete 단건도 일단 3으로 두고, '대량' 집계 판정은 상관 엔진(threshold) 몫.
    - match: { verb: [delete], resource: [pods, deployments] }
      severity: 3
    # 4 critical: 네임스페이스 삭제 (S8 재료) - 그 안의 모든 리소스가 통째로 사라지는
    # 파괴적 행위라 T1485(Data Destruction)급. 이전엔 이 리소스에 대응하는 규칙이
    # 없어서 default(2)로 남아 S8이 severity 4로 발화해도 원본 이벤트 심각도가 안
    # 맞는 게 버그였다.
    - match: { verb: [delete], resource: [namespaces] }
      severity: 4
    # 4 critical: 컨테이너 이스케이프 벡터를 가진 pod 생성 (S16 재료) - privileged/
    # hostNetwork/hostPID/hostIPC/hostPath 마운트 중 하나라도 있으면 4. request body
    # 기반 조건이라 pod_security_flags_any로 매칭(normalize_audit()이 이미 계산해둔
    # pod_security_flags를 get_severity()에 넘겨준다) - 아래 "워크로드 변경 맥락"
    # 규칙보다 반드시 먼저 와야 한다(첫 매치 우선이라 안 그러면 이 규칙까지 안 옴).
    - match: { verb: [create], resource: [pods], pod_security_flags_any: [privileged, host_network, host_pid, host_ipc, host_path_volume] }
      severity: 4
    # 3 high: NodePort Service 노출 (S17 재료) - 클러스터 밖에서 직접 접근 가능한
    # 경로가 새로 생기는/바뀌는 것이라 일반 서비스 변경보다 위험하다. audit_service_type이
    # request body 기반이라 service_type으로 매칭.
    - match: { verb: [create, update, patch], resource: [services], service_type: NodePort }
      severity: 3
    # 4 critical: ConfigMap에 평문 자격증명 노출 (S18 재료) - Secret과 달리 암호화
    # 없이 저장되므로 자격증명 유출 그 자체다. configmap_has_credentials가 request
    # body 기반이라 그 값으로 매칭.
    - match: { verb: [create, update, patch], resource: [configmaps], configmap_has_credentials: true }
      severity: 4
    # 3 high: TLS 없는 Ingress 생성 (S24 재료, 2026-07-14) - 클러스터 밖에서 평문으로
    # 접근 가능한 새 경로가 생기는 것이라 NodePort Service(바로 위)와 같은 급.
    # ingress_has_tls가 request body 기반이라 그 값으로 매칭 - None(판정 불가)은
    # 이 규칙에 안 걸리고 아래 default로 떨어진다.
    - match: { verb: [create], resource: [ingresses], ingress_has_tls: false }
      severity: 3
    # 2 medium: 워크로드 변경 맥락
    - match: { verb: [create, update, patch], resource: [pods, deployments] }
      severity: 2
    # 1 low: 일반 조회
    - match: { verb: [get, list, watch] }
      severity: 1
  default: 2
